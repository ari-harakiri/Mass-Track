<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Mass Track</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{min-height:100vh;font-family:system-ui,sans-serif;transition:background 0.3s,color 0.3s;}
.wrap{max-width:480px;margin:0 auto;padding:20px 16px 60px;}
/* Cards */
.card{background:var(--card);border:3px solid var(--border);border-radius:14px;box-shadow:4px 4px 0 var(--shadow);padding:16px;margin-bottom:14px;}
.card-main{background:var(--main);border:3px solid var(--border);border-radius:14px;box-shadow:4px 4px 0 var(--shadow);padding:14px 18px;margin-bottom:14px;}
/* Inputs */
input,select,button,textarea{font-family:inherit;}
.inp{background:var(--inp);border:2px solid var(--border);border-radius:9px;color:var(--text);padding:9px 12px;font-size:14px;outline:none;width:100%;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
/* Buttons */
.btn{background:var(--main);color:var(--btntxt);border:2px solid var(--border);border-radius:9px;padding:10px 16px;font-weight:700;font-size:14px;cursor:pointer;box-shadow:2px 2px 0 var(--shadow);width:100%;display:block;text-align:center;}
.btn-sm{padding:6px 12px;font-size:12px;width:auto;display:inline-block;}
.btn-acc{background:var(--accent)!important;}
.btn-grn{background:var(--green)!important;}
.btn-neu{background:var(--inp)!important;color:var(--text)!important;}
/* Tabs */
.tabs{display:flex;background:var(--card);border:3px solid var(--border);border-radius:12px;padding:4px;gap:4px;box-shadow:4px 4px 0 var(--shadow);margin-bottom:16px;}
.tab{flex:1;padding:7px 2px;border-radius:9px;border:2px solid transparent;cursor:pointer;font-weight:700;font-size:10px;background:transparent;color:var(--muted);font-family:inherit;}
.tab.on{background:var(--tab);color:var(--btntxt);border-color:var(--border);}
.pane{display:none;}.pane.on{display:block;}
/* Grids */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
/* Stat card */
.sc{border:3px solid var(--border);border-radius:12px;padding:12px 14px;box-shadow:3px 3px 0 var(--shadow);}
/* Entry row */
.entry{background:var(--card);border:3px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:flex-start;box-shadow:3px 3px 0 var(--shadow);}
.del{background:var(--acc2);border:2px solid var(--border);color:var(--btntxt);cursor:pointer;font-size:14px;font-weight:700;padding:4px 10px;border-radius:8px;font-family:inherit;}
/* Misc */
.sec{font-size:12px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;}
.err{color:var(--accent);font-size:12px;font-weight:600;margin-bottom:8px;display:none;}
.chip{background:var(--inp);border:2px solid var(--border);border-radius:8px;padding:6px 10px;text-align:center;}
.chip-l{font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:700;}
.chip-v{font-size:16px;font-weight:800;}
.row{display:flex;gap:8px;margin-bottom:8px;align-items:stretch;}
.row .inp{flex:1;}
/* Chart */
.chart-box{height:240px;margin-bottom:10px;}
canvas{display:block;width:100%!important;}
.legend{display:flex;gap:12px;padding-left:4px;margin-top:6px;flex-wrap:wrap;}
.li{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted);}
.ld{width:10px;height:10px;border-radius:2px;}
/* Time toggle */
.ttime{display:flex;border:2px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:2px 2px 0 var(--shadow);flex-shrink:0;}
.ttime button{flex:1;padding:9px 14px;border:none;cursor:pointer;font-size:18px;background:var(--inp);font-family:inherit;}
.ttime button.am{background:var(--goalc);}
.ttime button.pm{background:var(--main);color:var(--btntxt);}
/* Metric tabs */
.mtabs{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap;}
.mtab{padding:6px 10px;border-radius:8px;border:2px solid transparent;cursor:pointer;font-weight:700;font-size:10px;background:var(--card);color:var(--muted);font-family:inherit;}
.mtab.on{background:var(--main);color:var(--btntxt);border-color:var(--border);}
/* Photo grid */
.ph2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.pcrd{border:3px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:3px 3px 0 var(--shadow);}
.pcrd img{width:100%;aspect-ratio:1;object-fit:cover;display:block;}
.pinfo{padding:8px 10px;background:var(--card);display:flex;justify-content:space-between;align-items:center;}
/* Profile avatar */
.av{width:56px;height:56px;border-radius:50%;border:3px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;overflow:hidden;background:var(--main);}
.av img{width:100%;height:100%;object-fit:cover;}
</style>

// ═══════════════════════════════════
// HELPERS
// ═══════════════════════════════════
function pk(k){ return 'mt_'+currentProfile.id+'_'+k; }
function getEntries(){ return gl(pk('entries'),[]); }
function getMeas(){ return gl(pk('meas'),[]); }
function getGoal(){ return gl(pk('goal'),150); }
function getBfGoal(){ return gl(pk('bfgoal'),25); }
function pal(){ return PAL[tempPalette||currentPalette]||PAL.primary; }
function profilePal(p){ return PAL[p.palette||'primary']||PAL.primary; }

function sorted(e){ return [...e].sort((a,b)=>a.date.localeCompare(b.date)); }

function filtered(e){
  let s=sorted(e);
  if(datePreset==='custom'){
    if(dateFrom) s=s.filter(x=>x.date>=dateFrom);
    if(dateTo)   s=s.filter(x=>x.date<=dateTo);
  } else if(datePreset!=='all'){
    const days={week:7,month:30,three:90,six:180,year:365}[datePreset]||0;
    if(days){ const f=new Date(); f.setDate(f.getDate()-days); const fs=f.toISOString().split('T')[0]; s=s.filter(x=>x.date>=fs); }
  }
  return s;
}

function mavg(data,key,w=5){
  return data.map((d,i)=>{
    const sl=data.slice(Math.max(0,i-w+1),i+1).filter(x=>x[key]!=null);
    return {...d,[key+'T']:sl.length?parseFloat((sl.reduce((s,x)=>s+x[key],0)/sl.length).toFixed(2)):null};
  });
}

function calcStats(e){
  const s=sorted(e);
  if(!s.length) return null;
  const ws=s.map(x=>x.weight);
  const bfs=s.map(x=>x.bodyFat).filter(Boolean);
  const cur=ws[ws.length-1];
  const last=s[s.length-1];
  return{
    cur, min:Math.min(...ws), max:Math.max(...ws),
    avg:(ws.reduce((a,b)=>a+b,0)/ws.length).toFixed(1),
    chg:(cur-ws[0]).toFixed(1),
    bf:last.bodyFat, bmi:last.bmi, muscle:last.musclePct,
    visceral:last.visceralFat, bmr:last.bmr,
    bfChg:bfs.length>1?(last.bodyFat-bfs[0]).toFixed(1):null,
  };
}

function bmiCat(b){
  if(!b) return null; const n=parseFloat(b);
  if(n<18.5) return{l:'Underweight',c:'#3b82f6'};
  if(n<25)   return{l:'Normal',c:'#16a34a'};
  if(n<30)   return{l:'Overweight',c:'#f59e0b'};
  return{l:'Obese',c:'#dc2626'};
}
function bfCat(b){
  if(!b) return null; const n=parseFloat(b);
  if(n<14) return{l:'Essential',c:'#3b82f6'};
  if(n<21) return{l:'Athletic',c:'#16a34a'};
  if(n<25) return{l:'Fitness',c:'#84cc16'};
  if(n<32) return{l:'Average',c:'#f59e0b'};
  return{l:'Obese',c:'#dc2626'};
}
function fd(d){ const[,m,day]=d.split('-'); return m+'/'+day; }
function today(){ return new Date().toISOString().split('T')[0]; }

// ═══════════════════════════════════
// APPLY PALETTE
// ═══════════════════════════════════
function applyPalette(palKey){
  const q=PAL[palKey]||PAL.primary;
  const r=document.documentElement;
  const vars={
    '--bg':q.bg,'--text':q.text,'--muted':q.muted,'--faint':q.faint,
    '--main':q.main,'--accent':q.accent,'--acc2':q.acc2,
    '--goalc':q.goalc,'--card':q.card,'--inp':q.inp,
    '--border':q.border,'--shadow':q.shadow,
    '--green':q.green,'--purple':q.purple,
    '--btntxt':q.btntxt,'--tab':q.tab,
  };
  for(const[k,v]of Object.entries(vars)) r.style.setProperty(k,v);
  document.body.style.background = q.bodyBg||q.bg;
  document.body.style.color = q.text;
  document.body.style.fontFamily = q.font||'system-ui,sans-serif';
}

// Track pending edits per profile
const pendingEdits = {};

window.selectProfile = function(id){
  currentProfile = profiles.find(x=>x.id===id);
  currentPalette = currentProfile.palette||'primary';
  tempPalette = null;
  sl('mt_last', {id});
  render();
};

window.addProfile = function(){
  if(profiles.length>=MAX_PROFILES){ alert('Maximum 5 profiles.'); return; }
  const id='p'+Date.now();
  profiles=[...profiles,{id,name:'New Person',icon:'⭐',palette:'primary',photo:null}];
  sl('mt_profiles',profiles);
  render();
  setTimeout(()=>toggleEdit(id),50);
};

window.deleteProfile = function(id){
  if(!confirm('Delete this profile and all its data?')) return;
  ['entries','meas','goal','bfgoal'].forEach(k=>{ try{localStorage.removeItem('mt_'+id+'_'+k);}catch{} });
  profiles=profiles.filter(x=>x.id!==id);
  sl('mt_profiles',profiles);
  render();
};

window.toggleEdit = function(id){
  // Close all other edit panels and revert their previews
  profiles.forEach(p=>{
    if(p.id!==id){
      const ep=document.getElementById('edit-'+p.id);
      if(ep) ep.style.display='none';
      if(pendingEdits[p.id]){
        if(tempPalette && pendingEdits[p.id].palette){ tempPalette=null; applyPalette(currentPalette); }
        delete pendingEdits[p.id];
      }
    }
  });
  const ep=document.getElementById('edit-'+id);
  if(!ep) return;
  const isOpen = ep.style.display!=='none';
  if(isOpen){
    cancelEdit(id);
  } else {
    ep.style.display='block';
    pendingEdits[id]={icon:null,palette:null,photo:null,photoRemoved:false};
  }
};

window.pickIcon = function(id,ic){
  if(!pendingEdits[id]) pendingEdits[id]={icon:null,palette:null,photo:null,photoRemoved:false};
  pendingEdits[id].icon=ic;
  // Update icon button styles
  const prof=profiles.find(x=>x.id===id);
  ICONS.forEach(i=>{
    const b=document.getElementById('ico-'+id+'-'+i);
    if(!b) return;
    const pp=profilePal(prof);
    b.style.border=i===ic?'3px solid '+pp.border:'2px solid transparent';
    b.style.background=i===ic?pp.main:'transparent';
  });
};

window.previewTheme = function(id,palKey){
  if(!pendingEdits[id]) pendingEdits[id]={icon:null,palette:null,photo:null,photoRemoved:false};
  pendingEdits[id].palette=palKey;
  tempPalette=palKey;
  applyPalette(palKey);
  // Update theme button borders
  Object.keys(PAL).forEach(k=>{
    const b=document.getElementById('thm-'+id+'-'+k);
    if(!b) return;
    const v=PAL[k];
    b.style.border=k===palKey?'3px solid '+v.border:'2px solid transparent';
  });
};

window.previewProfilePhoto = function(id, input){
  const file=input.files[0];
  if(!file) return;
  if(!pendingEdits[id]) pendingEdits[id]={icon:null,palette:null,photo:null,photoRemoved:false};
  const reader=new FileReader();
  reader.onload=ev=>{
    pendingEdits[id].photo=ev.target.result;
    const el=document.getElementById('previewPhoto-'+id);
    if(el){
      el.outerHTML=`<img id="previewPhoto-${id}" src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover;">`;
    }
  };
  reader.readAsDataURL(file);
};

window.removeProfilePhoto = function(id){
  if(!pendingEdits[id]) pendingEdits[id]={icon:null,palette:null,photo:null,photoRemoved:false};
  pendingEdits[id].photoRemoved=true;
  pendingEdits[id].photo=null;
  const el=document.getElementById('previewPhoto-'+id);
  const prof=profiles.find(x=>x.id===id);
  if(el) el.outerHTML=`<span id="previewPhoto-${id}">${prof.icon||'⭐'}</span>`;
};

window.saveEdit = function(id){
  const nameEl=document.getElementById('editName-'+id);
  const name=nameEl?.value.trim();
  if(!name){ alert('Please enter a name.'); return; }
  const pending=pendingEdits[id]||{};
  const prof=profiles.find(x=>x.id===id);
  const newIcon=pending.icon||prof.icon||'⭐';
  const newPalette=pending.palette||prof.palette||'primary';
  const newPhoto=pending.photoRemoved?null:(pending.photo||prof.photo||null);
  profiles=profiles.map(x=>x.id===id?{...x,name,icon:newIcon,palette:newPalette,photo:newPhoto}:x);
  sl('mt_profiles',profiles);
  if(currentProfile?.id===id){
    currentProfile={...currentProfile,name,icon:newIcon,palette:newPalette,photo:newPhoto};
    sl('mt_last',{id});
  }
  delete pendingEdits[id];
  currentPalette=newPalette;
  tempPalette=null;
  render();
};

window.cancelEdit = function(id){
  const ep=document.getElementById('edit-'+id);
  if(ep) ep.style.display='none';
  // Revert theme preview
  if(pendingEdits[id]?.palette){
    tempPalette=null;
    applyPalette(currentPalette);
  }
  delete pendingEdits[id];
};

function renderRing(s,g,bfg,st){
  if(!st) return '<div class="card" style="text-align:center;color:var(--muted);padding:40px 0;">No data yet.</div>';
  const q=pal();
  const start=s[0]?.weight??st.cur;
  const lost=start-st.cur;
  const pct=Math.min(100,Math.max(0,(start-g)>0?(lost/(start-g))*100:0));
  const R=70,cx=120,cy=100,sw=20,circ=2*Math.PI*R;
  const bfStart=s.find(x=>x.bodyFat)?.bodyFat;
  const bfPct=bfStart&&st.bf&&bfg<bfStart?Math.min(100,Math.max(0,((bfStart-st.bf)/(bfStart-bfg))*100)):null;
  return `<div class="card"><div style="display:flex;justify-content:space-around;flex-wrap:wrap;gap:8px;">
    <div style="text-align:center;">
      <svg width="240" height="200">
        <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${q.border}33" stroke-width="${sw}"/>
        <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${pct>=100?q.green:q.main}" stroke-width="${sw}" stroke-dasharray="${(pct/100)*circ} ${circ}" stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})"/>
        <text x="${cx}" y="${cy-10}" text-anchor="middle" font-size="26" font-weight="900" fill="${q.text}">${Math.round(pct)}%</text>
        <text x="${cx}" y="${cy+14}" text-anchor="middle" font-size="12" fill="${q.muted}">to goal</text>
        <text x="${cx}" y="${cy+32}" text-anchor="middle" font-size="10" fill="${q.faint}">${st.cur} → ${g} lbs</text>
        <text x="${cx}" y="${cy+50}" text-anchor="middle" font-size="11" fill="${lost>=0?q.green:q.accent}" font-weight="700">${lost>=0?'↓ '+lost.toFixed(1)+' lbs lost':'↑ '+Math.abs(lost).toFixed(1)+' gained'}</text>
      </svg>
      <div style="font-size:12px;font-weight:700;color:var(--muted);">⚖️ Weight Goal</div>
    </div>
    ${bfPct!==null?`<div style="text-align:center;">
      <svg width="240" height="200">
        <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${q.border}33" stroke-width="${sw}"/>
        <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${bfPct>=100?q.green:q.purple}" stroke-width="${sw}" stroke-dasharray="${(bfPct/100)*circ} ${circ}" stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})"/>
        <text x="${cx}" y="${cy-10}" text-anchor="middle" font-size="26" font-weight="900" fill="${q.text}">${Math.round(bfPct)}%</text>
        <text x="${cx}" y="${cy+14}" text-anchor="middle" font-size="12" fill="${q.muted}">to BF goal</text>
        <text x="${cx}" y="${cy+50}" text-anchor="middle" font-size="11" fill="${q.purple}" font-weight="700">Now: ${st.bf}%</text>
      </svg>
      <div style="font-size:12px;font-weight:700;color:var(--muted);">🔥 BF Goal</div>
    </div>`:''}
  </div></div>`;
}

function renderHeatmap(s){
  const q=pal();
  const byDate={};
  s.forEach(x=>{ if(x[chartMetric]!=null) byDate[x.date]=x[chartMetric]; });
  const vals=Object.values(byDate).filter(Boolean);
  const vMin=vals.length?Math.min(...vals):0, vMax=vals.length?Math.max(...vals):1;
  const now=new Date(), start=new Date(now);
  start.setDate(start.getDate()-7*26+1);
  start.setDate(start.getDate()-start.getDay());
  const weeks=[];
  for(let w=0;w<26;w++){
    const wk=[];
    for(let d=0;d<7;d++){
      const dt=new Date(start); dt.setDate(start.getDate()+w*7+d);
      const k=dt.toISOString().split('T')[0];
      wk.push({date:k,v:byDate[k]??null});
    }
    weeks.push(wk);
  }
  const gc=v=>{ if(v==null) return q.inp; const t=(v-vMin)/(vMax-vMin||1); return `rgb(${Math.round(22+t*198)},${Math.round(163-t*125)},${Math.round(74-t*74)})`; };
  const cs=11,gap=2;
  return `<div class="card">
    <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px;">🗓️ Last 6 months</div>
    <div style="overflow-x:auto;"><div style="display:flex;gap:${gap}px;">
      <div style="display:flex;flex-direction:column;gap:${gap}px;margin-right:2px;">
        ${['S','M','T','W','T','F','S'].map(d=>`<div style="height:${cs}px;font-size:8px;color:var(--faint);display:flex;align-items:center;">${d}</div>`).join('')}
      </div>
      ${weeks.map(wk=>`<div style="display:flex;flex-direction:column;gap:${gap}px;">${wk.map(c=>`<div title="${c.date}${c.v!=null?': '+c.v:''}." style="width:${cs}px;height:${cs}px;border-radius:2px;background:${gc(c.v)};"></div>`).join('')}</div>`).join('')}
    </div></div>
    <div style="display:flex;align-items:center;gap:4px;margin-top:8px;">
      <span style="font-size:10px;color:var(--faint);">Less</span>
      ${[0,.25,.5,.75,1].map(t=>`<div style="width:12px;height:12px;border-radius:2px;background:${gc(vMin+t*(vMax-vMin))};"></div>`).join('')}
      <span style="font-size:10px;color:var(--faint);">More</span>
    </div>
  </div>`;
}

// ═══════════════════════════════════
// CANVAS CHART (no external deps)
// ═══════════════════════════════════
function drawChart(){
  const canvas=document.getElementById('MC');
  if(!canvas) return;
  const e=getEntries(), g=getGoal(), bfg=getBfGoal();
  const s=filtered(e);
  const q=pal();

  const dpr=window.devicePixelRatio||1;
  const W=canvas.parentElement.clientWidth-4;
  const H=240;
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);

  ctx.fillStyle='#ffffff';
  ctx.fillRect(0,0,W,H);

  if(!s.length){
    ctx.fillStyle='#888'; ctx.font='14px system-ui'; ctx.textAlign='center';
    ctx.fillText('Add entries to see your chart.',W/2,H/2);
    return;
  }

  const PAD={t:14,r:14,b:32,l:44};
  const CW=W-PAD.l-PAD.r, CH=H-PAD.t-PAD.b;
  const mcolor=CHART_COLORS[chartMetric]||'#1d4ed8';

  // Build data arrays
  let labels,vals,trend,rateD,rateL,fatV,musV,othV;

  if(chartType==='stacked'){
    const sd=s.filter(d=>d.bodyFat!=null&&d.musclePct!=null);
    if(sd.length<2){ ctx.fillStyle='#888'; ctx.font='13px system-ui'; ctx.textAlign='center'; ctx.fillText('Need body fat & muscle data.',W/2,H/2); return; }
    labels=sd.map(d=>fd(d.date));
    fatV=sd.map(d=>parseFloat((d.weight*d.bodyFat/100).toFixed(1)));
    musV=sd.map(d=>parseFloat((d.weight*d.musclePct/100).toFixed(1)));
    othV=sd.map(d=>Math.max(0,parseFloat((d.weight*(1-d.bodyFat/100-d.musclePct/100)).toFixed(1))));
  } else if(chartType==='rate'){
    rateD=[]; rateL=[];
    for(let i=1;i<s.length;i++){
      const prev=s[i-1],curr=s[i];
      const days=(new Date(curr.date)-new Date(prev.date))/86400000;
      if(days>0&&days<=14){ rateD.push(parseFloat(((curr.weight-prev.weight)/days*7).toFixed(2))); rateL.push(fd(curr.date)); }
    }
    if(rateD.length<2){ ctx.fillStyle='#888'; ctx.font='13px system-ui'; ctx.textAlign='center'; ctx.fillText('Need more entries to calculate.',W/2,H/2); return; }
  } else {
    const data=mavg(s,chartMetric);
    labels=data.map(d=>fd(d.date));
    vals=data.map(d=>d[chartMetric]);
    trend=data.map(d=>d[chartMetric+'T']);
  }

  // Y range
  const cGoal=chartMetric==='weight'?g:chartMetric==='bodyFat'?bfg:null;
  let allN=[];
  if(chartType==='stacked') allN=fatV.map((_,i)=>(fatV[i]||0)+(musV[i]||0)+(othV[i]||0));
  else if(chartType==='rate') allN=rateD;
  else allN=[...(vals||[]),...(trend||[])].filter(v=>v!=null);
  if(cGoal) allN.push(cGoal);
  const vMin=allN.length?Math.floor(Math.min(...allN)-2):0;
  const vMax=allN.length?Math.ceil(Math.max(...allN)+2):100;
  const vR=vMax-vMin||1;

  const lbs=chartType==='rate'?rateL:labels;
  const N=lbs?.length||1;
  const xP=i=>PAD.l+(i/(Math.max(N-1,1)))*CW;
  const xB=i=>PAD.l+(i/N)*CW;
  const bW=()=>Math.max(2,CW/N*0.7);
  const yP=v=>PAD.t+(1-(v-vMin)/vR)*CH;

  // Grid lines — always dark on white background
  ctx.strokeStyle='#e5e7eb'; ctx.lineWidth=1;
  ctx.font='10px system-ui'; ctx.fillStyle='#888'; ctx.textAlign='right';
  for(let i=0;i<=5;i++){
    const v=vMin+(vR*i/5); const y=yP(v);
    ctx.beginPath(); ctx.moveTo(PAD.l,y); ctx.lineTo(PAD.l+CW,y); ctx.stroke();
    ctx.fillText(Math.round(v),PAD.l-4,y+3);
  }

  // X labels
  ctx.fillStyle='#888'; ctx.textAlign='center';
  const step=Math.max(1,Math.ceil(N/7));
  lbs?.forEach((l,i)=>{ if(i%step===0) ctx.fillText(l,xP(i),H-PAD.b+14); });

  // Zero line for rate
  if(chartType==='rate'){
    ctx.strokeStyle='#333'; ctx.lineWidth=1.5; ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(PAD.l,yP(0)); ctx.lineTo(PAD.l+CW,yP(0)); ctx.stroke();
  }

  // Goal line
  if(cGoal&&chartType!=='stacked'&&chartType!=='rate'){
    ctx.strokeStyle=CHART_GOAL; ctx.lineWidth=1.5; ctx.setLineDash([5,3]);
    ctx.beginPath(); ctx.moveTo(PAD.l,yP(cGoal)); ctx.lineTo(PAD.l+CW,yP(cGoal)); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle=CHART_GOAL; ctx.textAlign='right'; ctx.font='10px system-ui';
    ctx.fillText('Goal '+cGoal,PAD.l+CW,yP(cGoal)-4);
  }

  ctx.setLineDash([]);

  // Draw bars / lines
  if(chartType==='bar'){
    vals.forEach((v,i)=>{ if(v==null)return; ctx.fillStyle=mcolor; ctx.fillRect(xB(i)+bW()*0.15,yP(v),bW(),yP(vMin)-yP(v)); });

  } else if(chartType==='stacked'){
    fatV.forEach((_,i)=>{
      let base=vMin;
      [[fatV[i],CHART_RED],[musV[i],CHART_GREEN],[othV[i],'#93c5fd']].forEach(([v,c])=>{
        if(!v)return; ctx.fillStyle=c; ctx.fillRect(xB(i)+bW()*0.15,yP(base+v),bW(),yP(base)-yP(base+v)); base+=v;
      });
    });

  } else if(chartType==='rate'){
    rateD.forEach((v,i)=>{
      ctx.fillStyle=v<=0?CHART_GREEN:CHART_RED;
      const y=v<=0?yP(v):yP(0), h=Math.abs(yP(0)-yP(v));
      ctx.fillRect(xB(i)+bW()*0.15,y,bW(),Math.max(2,h));
    });

  } else {
    // Combo bars
    if(chartType==='combo'){
      vals.forEach((v,i)=>{ if(v==null)return; ctx.fillStyle=mcolor+'88'; ctx.fillRect(xB(i)+bW()*0.15,yP(v),bW(),yP(vMin)-yP(v)); });
    }
    // Area fill
    if(chartType==='area'&&vals.filter(v=>v!=null).length>1){
      ctx.beginPath(); let first=true;
      vals.forEach((v,i)=>{ if(v==null)return; first?(ctx.moveTo(xP(i),yP(v)),first=false):ctx.lineTo(xP(i),yP(v)); });
      ctx.lineTo(xP(vals.length-1),yP(vMin)); ctx.lineTo(xP(vals.findIndex(v=>v!=null)),yP(vMin));
      ctx.closePath(); ctx.fillStyle=mcolor+'33'; ctx.fill();
    }
    // Scatter dots only
    if(chartType==='scatter'){
      vals.forEach((v,i)=>{ if(v==null)return; ctx.beginPath(); ctx.arc(xP(i),yP(v),5,0,Math.PI*2); ctx.fillStyle=mcolor; ctx.fill(); ctx.strokeStyle='#33333355'; ctx.lineWidth=1.5; ctx.stroke(); });
    } else {
      // Line
      ctx.beginPath(); ctx.strokeStyle=mcolor; ctx.lineWidth=2.5;
      let first=true;
      vals.forEach((v,i)=>{ if(v==null)return; first?(ctx.moveTo(xP(i),yP(v)),first=false):ctx.lineTo(xP(i),yP(v)); });
      ctx.stroke();
      // Dots
      vals.forEach((v,i)=>{ if(v==null)return; ctx.beginPath(); ctx.arc(xP(i),yP(v),4,0,Math.PI*2); ctx.fillStyle=mcolor; ctx.fill(); ctx.strokeStyle='#33333344'; ctx.lineWidth=1.5; ctx.stroke(); });
    }
    // Trend line
    if(trend&&trend.filter(v=>v!=null).length>1){
      ctx.beginPath(); ctx.setLineDash([4,2]); ctx.strokeStyle=CHART_TREND; ctx.lineWidth=1.5;
      let first=true;
      trend.forEach((v,i)=>{ if(v==null)return; first?(ctx.moveTo(xP(i),yP(v)),first=false):ctx.lineTo(xP(i),yP(v)); });
      ctx.stroke(); ctx.setLineDash([]);
    }
  }

  // Legend
  const leg=document.getElementById('LEG');
  if(leg){
    if(chartType==='stacked')
      leg.innerHTML=`<div class="li"><div class="ld" style="background:${CHART_RED};"></div>Fat</div><div class="li"><div class="ld" style="background:${CHART_GREEN};"></div>Muscle</div><div class="li"><div class="ld" style="background:#93c5fd;"></div>Other</div>`;
    else if(chartType==='rate')
      leg.innerHTML=`<div class="li"><div class="ld" style="background:${CHART_GREEN};"></div>Lost</div><div class="li"><div class="ld" style="background:${CHART_RED};"></div>Gained</div>`;
    else
      leg.innerHTML=`<div class="li"><div class="ld" style="background:${mcolor};"></div>Actual</div><div class="li"><div class="ld" style="background:${CHART_TREND};"></div>Trend</div>${cGoal?`<div class="li"><div class="ld" style="background:${CHART_GOAL};"></div>Goal</div>`:''}`;
  }
}

window.importCSV = function(inp){
  const file=inp.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const lines=ev.target.result.trim().split('\n');
      const results=[];
      for(let i=1;i<lines.length;i++){
        const row=lines[i].replace(/^"|"$/g,'').split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/);
        if(row.length<2) continue;
        const timeStr=row[0].replace(/"/g,'').trim();
        const wRaw=row[1].replace(/lb/gi,'').trim();
        const bmiRaw=row[2]?.trim();
        const bfRaw=row[3]?.replace(/%/g,'').trim();
        const visRaw=row[6]?.trim();
        const musRaw=row[8]?.replace(/%/g,'').trim();
        const bmrRaw=row[12]?.replace(/kcal/gi,'').trim();
        const dt=new Date(timeStr); if(isNaN(dt)) continue;
        const date=dt.toISOString().split('T')[0];
        const weight=parseFloat(wRaw); if(isNaN(weight)) continue;
        results.push({
          date, weight:Math.round(weight*10)/10,
          time:dt.getHours()<12?'morning':'night',
          bodyFat:bfRaw&&bfRaw!=='--'?parseFloat(bfRaw):null,
          bmi:bmiRaw&&bmiRaw!=='--'?parseFloat(bmiRaw):null,
          visceralFat:visRaw&&visRaw!=='--'?parseFloat(visRaw):null,
          musclePct:musRaw&&musRaw!=='--'?parseFloat(musRaw):null,
          bmr:bmrRaw&&bmrRaw!=='--'?parseInt(bmrRaw):null,
          note:'',photo:null,_t:dt.getTime()
        });
      }
      const byDate={};
      results.forEach(r=>{ if(!byDate[r.date]||r._t<byDate[r.date]._t) byDate[r.date]=r; });
      const parsed=Object.values(byDate).map(({_t,...r})=>r);
      if(!parsed.length){ alert('No data found. Check the file format.'); return; }
      const existing=getEntries();
      const merged={};
      [...existing,...parsed].forEach(r=>{ merged[r.date]=r; });
      sl(pk('entries'),Object.values(merged).sort((a,b)=>a.date.localeCompare(b.date)));
      alert('✅ Imported '+parsed.length+' entries!');
      render();
    }catch(err){ alert('Import failed. Please check the file.'); console.error(err); }
  };
  reader.readAsText(file);
  inp.value='';
};

  const headers=['Date','Time','Weight (lbs)','Body Fat %','Muscle %','Visceral Fat','BMI','BMR','Note'];
  const rows=s.map(x=>[
    x.date,
    x.time||'',
    x.weight??'',
    x.bodyFat??'',
    x.musclePct??'',
    x.visceralFat??'',
    x.bmi??'',
    x.bmr??'',
    (x.note||'').replace(/,/g,';'),
  ]);

  const csv=[headers,...rows].map(r=>r.join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`${currentProfile.name.replace(/\s+/g,'-')}-mass-track-${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  URL.revokeObjectURL(url);
};

window.exportChart = function(){
  if(!currentProfile){ alert('Please select a profile first.'); return; }
  const canvas=document.getElementById('MC');
  if(!canvas){ alert('No chart visible.'); return; }
  const a=document.createElement('a');
  a.href=canvas.toDataURL('image/png');
  a.download=`${currentProfile.name.replace(/\s+/g,'-')}-chart-${chartMetric}-${new Date().toISOString().split('T')[0]}.png`;
  a.click();
};

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
window.addEventListener('resize',()=>{ if(currentProfile&&activeTab==='chart') drawChart(); });

// Restore last session
const last=gl('mt_last',null);
if(last){
  const found=profiles.find(x=>x.id===last.id);
  if(found){
    currentProfile=found;
    currentPalette=found.palette||'primary';
  }
}

// If no last session, set page to last profile's palette or primary
if(!currentProfile){
  currentPalette=profiles[0]?.palette||'primary';
}

render();
</script>
</body>
</html>
