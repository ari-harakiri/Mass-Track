<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Mass Track</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{min-height:100vh;transition:background 0.25s,color 0.25s;}
.wrap{max-width:480px;margin:0 auto;padding:20px 16px 60px;}
.card{background:var(--card);border:3px solid var(--border);border-radius:14px;box-shadow:4px 4px 0 var(--shadow);padding:16px;margin-bottom:14px;}
.card-main{background:var(--main);border:3px solid var(--border);border-radius:14px;box-shadow:4px 4px 0 var(--shadow);padding:14px 18px;margin-bottom:14px;}
input,select,button,textarea{font-family:inherit;}
.inp{background:var(--inp);border:2px solid var(--border);border-radius:9px;color:var(--inptxt);padding:9px 12px;font-size:14px;outline:none;width:100%;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
input[type=date]{-webkit-appearance:none;appearance:none;min-width:0;max-width:100%;background-clip:padding-box;}
.row>*{min-width:0;}
.g2>*,.g3>*{min-width:0;}
input[type=color]{padding:2px;height:36px;cursor:pointer;}
.btn{background:var(--main);color:var(--btntxt);border:2px solid var(--border);border-radius:9px;padding:10px 16px;font-weight:700;font-size:14px;cursor:pointer;box-shadow:2px 2px 0 var(--shadow);width:100%;display:block;text-align:center;}
.btn-sm{padding:6px 12px;font-size:12px;width:auto;display:inline-block;}
.btn-acc{background:var(--accent)!important;color:var(--acctxt)!important;}
.btn-grn{background:var(--green)!important;color:var(--grntxt)!important;}
.btn-neu{background:var(--neu)!important;color:var(--neutxt)!important;}
.tabs{display:flex;background:var(--card);border:3px solid var(--border);border-radius:12px;padding:4px;gap:3px;box-shadow:4px 4px 0 var(--shadow);margin-bottom:16px;flex-wrap:wrap;}
.tab{flex:1;min-width:44px;padding:7px 2px;border-radius:9px;border:2px solid transparent;cursor:pointer;font-weight:700;font-size:10px;background:transparent;color:var(--muted);font-family:inherit;text-align:center;}
.tab.on{background:var(--tab);color:var(--tabtxt);border-color:var(--border);}
.pane{display:none;}.pane.on{display:block;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.sc{border:3px solid var(--border);border-radius:12px;padding:12px 14px;box-shadow:3px 3px 0 var(--shadow);}
.entry{background:var(--card);border:3px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:flex-start;box-shadow:3px 3px 0 var(--shadow);}
.del{background:var(--acc2);border:2px solid var(--border);color:var(--acctxt);cursor:pointer;font-size:14px;font-weight:700;padding:4px 10px;border-radius:8px;font-family:inherit;}
.sec{font-size:12px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;}
.err{color:var(--accent);font-size:12px;font-weight:600;margin-bottom:8px;display:none;}
.chip{background:var(--inp);border:2px solid var(--border);border-radius:8px;padding:6px 10px;text-align:center;}
.chip-l{font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:700;}
.chip-v{font-size:16px;font-weight:800;color:var(--text);}
.row{display:flex;gap:8px;margin-bottom:8px;align-items:stretch;}
.row .inp{flex:1;}
.chart-box{height:240px;margin-bottom:10px;}
canvas{display:block;width:100%!important;}
.legend{display:flex;gap:12px;padding-left:4px;margin-top:6px;flex-wrap:wrap;}
.li{display:flex;align-items:center;gap:4px;font-size:10px;color:#555;}
.ld{width:10px;height:10px;border-radius:2px;}
.ttime{display:flex;border:2px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:2px 2px 0 var(--shadow);flex-shrink:0;}
.ttime button{flex:1;padding:9px 14px;border:none;cursor:pointer;font-size:18px;background:var(--inp);color:var(--inptxt);font-family:inherit;}
.ttime button.am{background:#fbbf24;color:#111;}
.ttime button.pm{background:#1e3a8a;color:#fff;}
.mtabs{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap;}
.mtab{padding:6px 10px;border-radius:8px;border:2px solid transparent;cursor:pointer;font-weight:700;font-size:10px;background:var(--neu);color:var(--neutxt);font-family:inherit;}
.mtab.on{background:var(--main);color:var(--btntxt);border-color:var(--border);}
.ph2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.pcrd{border:3px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:3px 3px 0 var(--shadow);}
.pcrd img{width:100%;aspect-ratio:1;object-fit:cover;display:block;}
.pinfo{padding:8px 10px;background:var(--card);display:flex;justify-content:space-between;align-items:center;}
.av{width:52px;height:52px;border-radius:50%;border:3px solid var(--border);overflow:hidden;background:var(--main);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.av img{width:100%;height:100%;object-fit:cover;}
.ex-card{background:var(--card);border:3px solid var(--border);border-radius:14px;box-shadow:4px 4px 0 var(--shadow);padding:16px;margin-bottom:12px;}
.ex-title{font-size:17px;font-weight:800;color:var(--text);margin-bottom:4px;}
.ex-desc{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:10px;}
.ex-meta{font-size:12px;color:var(--faint);font-weight:600;}
.check-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.check-row:last-child{border-bottom:none;}
.check-box{width:26px;height:26px;border:2px solid var(--border);border-radius:6px;cursor:pointer;background:var(--inp);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;font-family:inherit;}
.check-box.done{background:var(--green);color:var(--grntxt);}
.pose-card{background:var(--card);border:3px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:3px 3px 0 var(--shadow);}
.color-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.color-label{font-size:12px;font-weight:700;color:var(--text);width:130px;flex-shrink:0;}
.page-btn{padding:8px 14px;border-radius:9px;border:2px solid var(--border);cursor:pointer;font-weight:700;font-size:13px;background:var(--neu);color:var(--neutxt);font-family:inherit;}
.page-btn.on{background:var(--main);color:var(--btntxt);}
.ftab{padding:7px 12px;border-radius:9px;border:2px solid transparent;cursor:pointer;font-weight:700;font-size:11px;font-family:inherit;}
.ftab.on{background:var(--main);color:var(--btntxt);border-color:var(--border);}
.ftab.off{background:var(--card);color:var(--muted);}
</style>
</head>

function gl(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}}

// UNITS

function isMetric(){return currentProfile?.units==='metric';}
function wUnit(){return isMetric()?'kg':'lbs';}
function hUnit(){return isMetric()?'cm':'in';}
function dUnit(){return isMetric()?'km':'mi';}
function toDisplay(lbs){return isMetric()?+(lbs*0.453592).toFixed(1):lbs;}
function toStore(val){return isMetric()?+(val/0.453592).toFixed(1):val;}
function wLabel(lbs){return toDisplay(lbs)+' '+wUnit();}

function pk(k){return 'mt_'+currentProfile.id+'_'+k;}
function getEntries(){return gl(pk('entries'),[]);}
function getMeas(){return gl(pk('meas'),[]);}
function getGoal(){return gl(pk('goal'),150);}
function getBfGoal(){return gl(pk('bfgoal'),25);}
function getFitEntries(){return gl(pk('fit'),[]);}
function pal(){return getPal(tempPalette||currentPalette);}
function pp(prof){return getPal(prof.palette||'primary');}
function today(){return new Date().toISOString().split('T')[0];}
function todayDay(){return DAYS[new Date().getDay()];}

function sorted(e){return[...e].sort((a,b)=>a.date.localeCompare(b.date));}
function getDateRange(){
  if(datePreset==='all')return{from:null,to:null};
  if(datePreset==='custom')return{from:dateFrom||null,to:dateTo||null};
  const days={two_weeks:14,month:30,three:90,six:180,year:365}[datePreset]||0;
  if(!days)return{from:null,to:null};
  const f=new Date();f.setDate(f.getDate()-days);
  return{from:f.toISOString().split('T')[0],to:null};
}
function applyRange(e){
  const{from,to}=getDateRange();
  let s=sorted(e);
  if(from)s=s.filter(x=>x.date>=from);
  if(to)s=s.filter(x=>x.date<=to);
  return s;
}
function mavg(data,key,w=5){
  return data.map((d,i)=>{
    const sl=data.slice(Math.max(0,i-w+1),i+1).filter(x=>x[key]!=null);
    return{...d,[key+'T']:sl.length?+(sl.reduce((s,x)=>s+x[key],0)/sl.length).toFixed(2):null};
  });
}
function calcStats(e){
  const s=sorted(e);if(!s.length)return null;
  const ws=s.map(x=>x.weight);
  const bfs=s.map(x=>x.bodyFat).filter(Boolean);
  const cur=ws[ws.length-1];const last=s[s.length-1];
  return{cur,min:Math.min(...ws),max:Math.max(...ws),avg:+(ws.reduce((a,b)=>a+b,0)/ws.length).toFixed(1),chg:+(cur-ws[0]).toFixed(1),bf:last.bodyFat,bmi:last.bmi,muscle:last.musclePct,visceral:last.visceralFat,bmr:last.bmr,bfChg:bfs.length>1?+(last.bodyFat-bfs[0]).toFixed(1):null};
}
function bmiCat(b){if(!b)return null;const n=parseFloat(b);if(n<18.5)return{l:'Underweight',c:'#3b82f6'};if(n<25)return{l:'Normal',c:'#16a34a'};if(n<30)return{l:'Overweight',c:'#f59e0b'};return{l:'Obese',c:'#dc2626'};}
function bfCatF(b){if(!b)return null;const n=parseFloat(b);if(n<14)return{l:'Essential',c:'#3b82f6'};if(n<21)return{l:'Athletic',c:'#16a34a'};if(n<25)return{l:'Fitness',c:'#84cc16'};if(n<32)return{l:'Average',c:'#f59e0b'};return{l:'Obese',c:'#dc2626'};}

// Calculate streak

// ── BMI Calculation ──
function calcBMI(weightLbs, prof){
  if(!prof) return null;
  let heightM;
  if((prof.units||'imperial')==='metric'){
    heightM=(prof.heightCm||168)/100;
  } else {
    heightM=((prof.heightFt||5)*12+(prof.heightIn||6))*0.0254;
  }
  if(!heightM) return null;
  const kg=weightLbs*0.453592;
  return Math.round((kg/(heightM*heightM))*10)/10;
}

function calcStreak(){
  const fe=getFitEntries();
  if(!fe.length)return{current:0,best:0};
  const byDate={};fe.forEach(x=>{const p=byDate[x.date]||{};byDate[x.date]={exercise:p.exercise||x.exercise,warmup:p.warmup||x.warmup,stretch:p.stretch||x.stretch,miles:p.miles!=null?p.miles:x.miles,minutes:p.minutes!=null?p.minutes:x.minutes};});
  let current=0,best=0,streak=0;
  const now=new Date();
  for(let i=0;i<365;i++){
    const d=new Date(now);d.setDate(d.getDate()-i);
    const k=d.toISOString().split('T')[0];
    const e=byDate[k];
    if(e&&(e.exercise||e.warmup||e.stretch||e.miles!=null||e.minutes!=null)){streak++;}
    else{if(i===0){current=0;}else{if(i===1)current=0;break;}}
    if(i===0)current=streak;
  }
  // Calculate best
  const dates=Object.keys(byDate).sort();
  let cur2=0;
  for(let i=0;i<dates.length;i++){
    const e=byDate[dates[i]];
    if(e&&(e.exercise||e.warmup||e.stretch||e.miles!=null||e.minutes!=null)){
      if(i===0){cur2=1;}
      else{
        const prev=new Date(dates[i-1]);const curr2=new Date(dates[i]);
        const diff=(curr2-prev)/86400000;
        cur2=diff===1?cur2+1:1;
      }
      best=Math.max(best,cur2);
    }
  }
  current=streak;
  return{current,best};
}

  for(const[k,v]of Object.entries(vars))r.style.setProperty(k,v);
  document.body.style.background=q.bodyBg||q.bg;document.body.style.color=q.text;document.body.style.fontFamily=q.font||'system-ui,sans-serif';
}

window.previewTheme=function(id,palKey){
  if(!pendingEdits[id])pendingEdits[id]={icon:null,palette:null,photo:null,photoRemoved:false,units:'imperial',sex:'female'};
  pendingEdits[id].palette=palKey;tempPalette=palKey;applyPalette(palKey);
  const allPals=getAllPals();
  Object.keys(allPals).forEach(k=>{const b=document.getElementById('thm-'+id+'-'+k);if(!b)return;const v=allPals[k];b.style.border=k===palKey?'3px solid '+v.border:'2px solid transparent';});
};
window.previewPP=function(id,input){
  const file=input.files[0];if(!file)return;
  if(!pendingEdits[id])pendingEdits[id]={icon:null,palette:null,photo:null,photoRemoved:false,units:'imperial',sex:'female'};
  const reader=new FileReader();
  reader.onload=ev=>{pendingEdits[id].photo=ev.target.result;const el=document.getElementById('pp-'+id);if(el)el.outerHTML=`<img id="pp-${id}" src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover;">`;};
  reader.readAsDataURL(file);
};
window.removePP=function(id){
  if(!pendingEdits[id])pendingEdits[id]={icon:null,palette:null,photo:null,photoRemoved:false,units:'imperial',sex:'female'};
  pendingEdits[id].photoRemoved=true;pendingEdits[id].photo=null;
  const prof=profiles.find(x=>x.id===id);const el=document.getElementById('pp-'+id);
  if(el)el.outerHTML=`<span id="pp-${id}">${prof.icon||'⭐'}</span>`;
};
window.saveEdit=function(id){
  const nameEl=document.getElementById('eName-'+id);const name=nameEl?.value.trim();if(!name){alert('Please enter a name.');return;}
  const pending=pendingEdits[id]||{};const prof=profiles.find(x=>x.id===id);
  const newIcon=pending.icon||prof.icon||'⭐';const newPalette=pending.palette||prof.palette||'primary';
  const newPhoto=pending.photoRemoved?null:(pending.photo||prof.photo||null);
  const newUnits=pending.units||prof.units||'imperial';const newSex=pending.sex||prof.sex||'female';
  const newHeightFt=pending.heightFt!==undefined?pending.heightFt:(prof.heightFt||5);
  const newHeightIn=pending.heightIn!==undefined?pending.heightIn:(prof.heightIn||6);
  const newHeightCm=pending.heightCm!==undefined?pending.heightCm:(prof.heightCm||168);
  profiles=profiles.map(x=>x.id===id?{...x,name,icon:newIcon,palette:newPalette,photo:newPhoto,units:newUnits,sex:newSex,heightFt:newHeightFt,heightIn:newHeightIn,heightCm:newHeightCm}:x);
  sl('mt_profiles',profiles);
  if(currentProfile?.id===id){currentProfile={...currentProfile,name,icon:newIcon,palette:newPalette,photo:newPhoto,units:newUnits,sex:newSex,heightFt:newHeightFt,heightIn:newHeightIn,heightCm:newHeightCm};sl('mt_last',{id});}
  delete pendingEdits[id];currentPalette=newPalette;tempPalette=null;render();
};
window.cancelEdit=function(id){
  const ep=document.getElementById('edit-'+id);if(ep)ep.style.display='none';
  if(pendingEdits[id]?.palette){tempPalette=null;applyPalette(currentPalette);}
  delete pendingEdits[id];
};
window.goProfiles=function(){currentProfile=null;tempPalette=null;currentPalette=profiles[0]?.palette||'primary';render();};

function renderLogEntries(entries){
  const s=[...entries].reverse();
  if(!s.length)return'<div class="card" style="text-align:center;color:var(--muted);padding:40px 0;">No entries for this range.</div>';
  const totalPages=Math.ceil(s.length/100);
  const page=Math.min(logPage,Math.max(0,totalPages-1));
  const pageEntries=s.slice(page*100,(page+1)*100);
  return`
    <div style="font-size:12px;color:var(--muted);margin-bottom:10px;font-weight:600;">${s.length} entries total${totalPages>1?' — Page '+(page+1)+' of '+totalPages:''}</div>
    ${pageEntries.map(x=>`<div class="entry"><div><div style="font-size:12px;color:var(--muted);">${x.date} ${x.time==='morning'?'☀️':'🌙'}</div><div style="font-size:18px;font-weight:800;color:var(--text);">${wLabel(x.weight)}${x.bodyFat!=null?`<span style="font-size:13px;color:#7c3aed;margin-left:8px;">${x.bodyFat}% BF</span>`:''}</div>${x.note?`<div style="font-size:12px;color:var(--muted);font-style:italic;">"${x.note}"</div>`:''}</div><button class="del" onclick="delEntry('${x.date}')">✕</button></div>`).join('')}
    ${totalPages>1?`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;justify-content:center;">
      ${page>0?`<button class="page-btn" onclick="logPage=${page-1};render();">← Prev</button>`:''}
      ${Array.from({length:totalPages},(_,i)=>`<button class="page-btn ${i===page?'on':''}" onclick="logPage=${i};render();">${i+1}</button>`).join('')}
      ${page<totalPages-1?`<button class="page-btn" onclick="logPage=${page+1};render();">Next →</button>`:''}
    </div>`:''}`;
}

function drawSingleChart(type){
  const canvas=document.getElementById('MC_'+type);if(!canvas)return;
  const s=applyRange(getEntries());
  const g=getGoal(),bfg=getBfGoal();
  const dpr=window.devicePixelRatio||1;
  const W=canvas.parentElement.clientWidth-4;const H=240;
  canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+'px';canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
  if(!s.length){ctx.fillStyle='#888';ctx.font='14px system-ui';ctx.textAlign='center';ctx.fillText('Add entries to see chart.',W/2,H/2);return;}
  const PAD={t:14,r:14,b:32,l:46};const CW=W-PAD.l-PAD.r,CH=H-PAD.t-PAD.b;
  const mcolor=CC[chartMetric]||'#1d4ed8';
  let labels,vals,trend,rateD,rateL,fatV,musV,othV;
  if(type==='stacked'){
    const sd=s.filter(d=>d.bodyFat!=null&&d.musclePct!=null);
    if(sd.length<2){ctx.fillStyle='#888';ctx.font='13px system-ui';ctx.textAlign='center';ctx.fillText('Need body fat & muscle data.',W/2,H/2);return;}
    labels=sd.map(d=>fd(d.date));fatV=sd.map(d=>+(d.weight*d.bodyFat/100).toFixed(1));musV=sd.map(d=>+(d.weight*d.musclePct/100).toFixed(1));othV=sd.map(d=>Math.max(0,+(d.weight*(1-d.bodyFat/100-d.musclePct/100)).toFixed(1)));
  }else if(type==='rate'){
    rateD=[];rateL=[];
    for(let i=1;i<s.length;i++){const prev=s[i-1],curr=s[i];const days=(new Date(curr.date)-new Date(prev.date))/86400000;if(days>=1&&days<=14){rateD.push(+(( curr.weight-prev.weight)/days*7).toFixed(2));rateL.push(fd(curr.date));}}
    if(!rateD.length){ctx.fillStyle='#888';ctx.font='13px system-ui';ctx.textAlign='center';ctx.fillText('No consecutive readings within 14 days.',W/2,H/2);return;}
  }else{const data=mavg(s,chartMetric);labels=data.map(d=>fd(d.date));vals=data.map(d=>d[chartMetric]);trend=data.map(d=>d[chartMetric+'T']);}
  const cGoal=(type!=='stacked'&&type!=='rate')?(chartMetric==='weight'?g:chartMetric==='bodyFat'?bfg:null):null;
  let vMin,vMax;
  if(type==='stacked'){const tot=fatV.map((_,i)=>(fatV[i]||0)+(musV[i]||0)+(othV[i]||0));vMin=0;vMax=Math.ceil(Math.max(...tot)*1.05);}
  else if(type==='rate'){const aM=Math.max(...rateD.map(Math.abs),0.5);vMin=-aM*1.3;vMax=aM*1.3;}
  else{const allN=[...(vals||[]),...(trend||[])].filter(v=>v!=null);if(cGoal)allN.push(cGoal);vMin=allN.length?Math.floor(Math.min(...allN)-2):0;vMax=allN.length?Math.ceil(Math.max(...allN)+2):100;}
  const vR=vMax-vMin||1;
  const lbs=type==='rate'?rateL:labels;const N=lbs?.length||1;
  const xP=i=>PAD.l+(i/(Math.max(N-1,1)))*CW;const xB=i=>PAD.l+(i/N)*CW;const bW=()=>Math.max(2,CW/N*0.75);const yP=v=>PAD.t+(1-(v-vMin)/vR)*CH;
  ctx.strokeStyle='#e5e7eb';ctx.lineWidth=1;ctx.font='10px system-ui';ctx.fillStyle='#888';ctx.textAlign='right';
  for(let i=0;i<=5;i++){const v=vMin+(vR*i/5);const y=yP(v);ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(PAD.l+CW,y);ctx.stroke();ctx.fillText(Math.round(v*10)/10,PAD.l-4,y+3);}
  ctx.fillStyle='#888';ctx.textAlign='center';const step=Math.max(1,Math.ceil(N/7));lbs?.forEach((l,i)=>{if(i%step===0)ctx.fillText(l,xP(i),H-PAD.b+14);});
  if(type==='rate'){ctx.strokeStyle='#333';ctx.lineWidth=1.5;ctx.setLineDash([]);ctx.beginPath();ctx.moveTo(PAD.l,yP(0));ctx.lineTo(PAD.l+CW,yP(0));ctx.stroke();}
  if(cGoal){ctx.strokeStyle=CG;ctx.lineWidth=1.5;ctx.setLineDash([5,3]);ctx.beginPath();ctx.moveTo(PAD.l,yP(cGoal));ctx.lineTo(PAD.l+CW,yP(cGoal));ctx.stroke();ctx.setLineDash([]);ctx.fillStyle=CG;ctx.textAlign='right';ctx.font='10px system-ui';ctx.fillText('Goal '+toDisplay(cGoal),PAD.l+CW,yP(cGoal)-4);}
  ctx.setLineDash([]);
  if(type==='bar'){vals.forEach((v,i)=>{if(v==null)return;ctx.fillStyle=mcolor;ctx.fillRect(xB(i)+bW()*0.15,yP(v),bW(),yP(vMin)-yP(v));});}
  else if(type==='stacked'){fatV.forEach((_,i)=>{let base=0;[[fatV[i],CBAD],[musV[i],CGOOD],[othV[i],'#93c5fd']].forEach(([v,c])=>{if(!v||v<=0)return;ctx.fillStyle=c;ctx.fillRect(xB(i)+bW()*0.15,yP(base+v),bW(),yP(base)-yP(base+v));base+=v;});});}
  else if(type==='rate'){rateD.forEach((v,i)=>{if(v===0)return;ctx.fillStyle=v<=0?CGOOD:CBAD;const bw=bW();const y=v<0?yP(v):yP(0);const h=Math.abs(yP(0)-yP(v));ctx.fillRect(xB(i)+bw*0.15,y,bw,Math.max(2,h));});}
  else{
    if(type==='combo'){vals.forEach((v,i)=>{if(v==null)return;ctx.fillStyle=mcolor+'88';ctx.fillRect(xB(i)+bW()*0.15,yP(v),bW(),yP(vMin)-yP(v));});}
    if(type==='area'&&vals.filter(v=>v!=null).length>1){ctx.beginPath();let first=true;vals.forEach((v,i)=>{if(v==null)return;first?(ctx.moveTo(xP(i),yP(v)),first=false):ctx.lineTo(xP(i),yP(v));});ctx.lineTo(xP(vals.length-1),yP(vMin));ctx.lineTo(xP(vals.findIndex(v=>v!=null)),yP(vMin));ctx.closePath();ctx.fillStyle=mcolor+'33';ctx.fill();}
    if(type==='scatter'){vals.forEach((v,i)=>{if(v==null)return;ctx.beginPath();ctx.arc(xP(i),yP(v),5,0,Math.PI*2);ctx.fillStyle=mcolor;ctx.fill();ctx.strokeStyle='#33333355';ctx.lineWidth=1.5;ctx.stroke();});}
    else{ctx.beginPath();ctx.strokeStyle=mcolor;ctx.lineWidth=2.5;let first=true;vals.forEach((v,i)=>{if(v==null)return;first?(ctx.moveTo(xP(i),yP(v)),first=false):ctx.lineTo(xP(i),yP(v));});ctx.stroke();vals.forEach((v,i)=>{if(v==null)return;ctx.beginPath();ctx.arc(xP(i),yP(v),4,0,Math.PI*2);ctx.fillStyle=mcolor;ctx.fill();ctx.strokeStyle='#33333344';ctx.lineWidth=1.5;ctx.stroke();});}
    if(trend&&trend.filter(v=>v!=null).length>1){ctx.beginPath();ctx.setLineDash([4,2]);ctx.strokeStyle=CT;ctx.lineWidth=1.5;let first=true;trend.forEach((v,i)=>{if(v==null)return;first?(ctx.moveTo(xP(i),yP(v)),first=false):ctx.lineTo(xP(i),yP(v));});ctx.stroke();ctx.setLineDash([]);}
  }
  const leg=document.getElementById('LEG_'+type);
  if(leg){if(type==='stacked')leg.innerHTML=`<div class="li"><div class="ld" style="background:${CBAD};"></div>Fat lbs</div><div class="li"><div class="ld" style="background:${CGOOD};"></div>Muscle lbs</div><div class="li"><div class="ld" style="background:#93c5fd;"></div>Other lbs</div>`;else if(type==='rate')leg.innerHTML=`<div class="li"><div class="ld" style="background:${CGOOD};"></div>Lost (lbs/wk)</div><div class="li"><div class="ld" style="background:${CBAD};"></div>Gained (lbs/wk)</div>`;else leg.innerHTML=`<div class="li"><div class="ld" style="background:${mcolor};"></div>Actual</div><div class="li"><div class="ld" style="background:${CT};"></div>Trend</div>${cGoal?`<div class="li"><div class="ld" style="background:${CG};"></div>Goal</div>`:''}`;}
}

function renderFitnessLog(fe, pageSize, page){
  pageSize = pageSize||30; page = page||actPage||0;
  const rangeF=applyRange(fe.map(x=>({...x}))).sort((a,b)=>b.date.localeCompare(a.date));
  if(!rangeF.length)return '<div class="card" style="text-align:center;color:var(--muted);padding:40px 0;">No activity logged yet.</div>';
  const totalPages=Math.ceil(rangeF.length/pageSize);
  const pg=Math.min(page,Math.max(0,totalPages-1));
  const pageItems=rangeF.slice(pg*pageSize,(pg+1)*pageSize);
  const rows=pageItems.map(x=>`<div class="entry"><div>

    <div style="font-size:15px;font-weight:800;color:var(--text);">${x.type?x.type+' — ':''}${[x.miles!=null?x.miles+' '+dUnit():null,x.minutes!=null?x.minutes+' min':null,x.steps!=null?Number(x.steps).toLocaleString()+' steps':null].filter(Boolean).join(' · ')||'Check-in only'}</div>
    <div style="font-size:12px;color:var(--muted);">${[x.exercise?'Workout':'',x.warmup?'Qigong':'',x.stretch?'Mobility':''].filter(Boolean).join(' · ')||''}</div>
  </div><button class="del" onclick="delFitEntry(${x.actId||0},'${x.date}')">✕</button></div>`).join('');
  const pagination=totalPages>1?`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;justify-content:center;">
    ${pg>0?`<button class="page-btn" onclick="actPage=${pg-1};render();">← Prev</button>`:''}
    ${Array.from({length:totalPages},(_,i)=>`<button class="page-btn ${i===pg?'on':''}" onclick="actPage=${i};render();">${i+1}</button>`).join('')}
    ${pg<totalPages-1?`<button class="page-btn" onclick="actPage=${pg+1};render();">Next →</button>`:''}
  </div>`:'';
  return rows+pagination;
}

window.calc1RM=function(){
  const wt=parseFloat(document.getElementById('rmWt')?.value);
  const reps=parseInt(document.getElementById('rmReps')?.value);
  if(isNaN(wt)||isNaN(reps)||reps<1||wt<1){alert('Enter valid weight and reps.');return;}
  let ex=document.getElementById('rmEx')?.value||'';
  if(ex==='__custom__'){ex=document.getElementById('rmCustomEx')?.value.trim()||'';}
  const orm=Math.round(wt*(1+reps/30));
  const result=document.getElementById('rmResult');
  const val=document.getElementById('rmVal');
  const breakdown=document.getElementById('rmBreakdown');
  if(result)result.style.display='block';
  if(val)val.textContent=orm+' '+wUnit();
  const pcts=[100,95,90,85,80,75,70];
  if(breakdown)breakdown.innerHTML=pcts.map(p=>`${p}% — ${Math.round(orm*p/100)} ${wUnit()}`).join('<br>');
  // Save to weight log as a single-set entry for PR tracking
  if(ex){
    const log=getWtLog();
    log.push({date:today(),exercise:ex,sets:1,reps,weight:wt,note:'1RM calc',orm,ts:Date.now()});
    sl(pk('wtlog'),log);
    const saved=document.getElementById('rmResult');
    if(saved){const tip=document.createElement('div');tip.style.cssText='font-size:11px;color:var(--green);font-weight:700;margin-top:6px;';tip.textContent='Saved to '+ex+' PR history';saved.appendChild(tip);setTimeout(()=>tip.remove(),2000);}
  }
};

function renderRing(s,g,bfg,st){
  if(!st)return'<div class="card" style="text-align:center;color:var(--muted);padding:40px 0;">No data yet.</div>';
  const q=pal();
  const start=s[0]?.weight??st.cur;const lost=start-st.cur;
  const pct=Math.min(100,Math.max(0,(start-g)>0?(lost/(start-g))*100:0));
  const R=70,cx=120,cy=100,sw=20,circ=2*Math.PI*R;
  const bfStart=s.find(x=>x.bodyFat)?.bodyFat;
  const bfPct=bfStart&&st.bf&&bfg<bfStart?Math.min(100,Math.max(0,((bfStart-st.bf)/(bfStart-bfg))*100)):null;
  return`<div class="card"><div style="display:flex;justify-content:space-around;flex-wrap:wrap;gap:8px;">
    <div style="text-align:center;"><svg width="240" height="200">
      <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="#e5e7eb" stroke-width="${sw}"/>
      <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${pct>=100?CGOOD:q.main}" stroke-width="${sw}" stroke-dasharray="${(pct/100)*circ} ${circ}" stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})"/>
      <text x="${cx}" y="${cy-10}" text-anchor="middle" font-size="26" font-weight="900" fill="${q.text}">${Math.round(pct)}%</text>
      <text x="${cx}" y="${cy+14}" text-anchor="middle" font-size="12" fill="${q.muted}">to goal</text>
      <text x="${cx}" y="${cy+32}" text-anchor="middle" font-size="10" fill="${q.faint}">${wLabel(st.cur)} → ${wLabel(g)}</text>
      <text x="${cx}" y="${cy+50}" text-anchor="middle" font-size="11" fill="${lost>=0?CGOOD:CBAD}" font-weight="700">${lost>=0?'↓ '+toDisplay(+lost.toFixed(1))+' '+wUnit()+' lost':'↑ '+toDisplay(+Math.abs(lost).toFixed(1))+' gained'}</text>
    </svg><div style="font-size:12px;font-weight:700;color:var(--muted);">Weight Goal</div></div>
    ${bfPct!==null?`<div style="text-align:center;"><svg width="240" height="200">
      <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="#e5e7eb" stroke-width="${sw}"/>
      <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${bfPct>=100?CGOOD:'#7c3aed'}" stroke-width="${sw}" stroke-dasharray="${(bfPct/100)*circ} ${circ}" stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})"/>
      <text x="${cx}" y="${cy-10}" text-anchor="middle" font-size="26" font-weight="900" fill="${q.text}">${Math.round(bfPct)}%</text>
      <text x="${cx}" y="${cy+14}" text-anchor="middle" font-size="12" fill="${q.muted}">to BF goal</text>
      <text x="${cx}" y="${cy+50}" text-anchor="middle" font-size="11" fill="#7c3aed" font-weight="700">Now: ${st.bf}%</text>
    </svg><div style="font-size:12px;font-weight:700;color:var(--muted);">Body Fat Goal</div></div>`:''}
  </div></div>`;
}

function renderHeatmap(s){
  const byDate={};s.forEach(x=>{if(x[chartMetric]!=null)byDate[x.date]=x[chartMetric];});
  const vals=Object.values(byDate).filter(Boolean);
  const vMin=vals.length?Math.min(...vals):0,vMax=vals.length?Math.max(...vals):1;
  const now=new Date(),hStart=new Date(now);
  hStart.setDate(hStart.getDate()-7*26+1);hStart.setDate(hStart.getDate()-hStart.getDay());
  const weeks=[];
  for(let w=0;w<26;w++){const wk=[];for(let d=0;d<7;d++){const dt=new Date(hStart);dt.setDate(hStart.getDate()+w*7+d);const k=dt.toISOString().split('T')[0];wk.push({date:k,v:byDate[k]??null});}weeks.push(wk);}
  const gc=v=>{if(v==null)return'#e5e7eb';const t=(v-vMin)/(vMax-vMin||1);return`rgb(${Math.round(22+t*198)},${Math.round(163-t*125)},${Math.round(74-t*74)})`;};
  const mNames={weight:'weight',bodyFat:'body fat %',musclePct:'muscle %',visceralFat:'visceral fat'};
  const cs=11,gap=2;
  return`<div class="card"><div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px;">Last 6 months — ${mNames[chartMetric]||chartMetric}</div>
  <div style="overflow-x:auto;"><div style="display:flex;gap:${gap}px;">
    <div style="display:flex;flex-direction:column;gap:${gap}px;margin-right:2px;">${['S','M','T','W','T','F','S'].map(d=>`<div style="height:${cs}px;font-size:8px;color:#888;display:flex;align-items:center;">${d}</div>`).join('')}</div>
    ${weeks.map(wk=>`<div style="display:flex;flex-direction:column;gap:${gap}px;">${wk.map(c=>`<div title="${c.date}${c.v!=null?': '+c.v:''}." style="width:${cs}px;height:${cs}px;border-radius:2px;background:${gc(c.v)};"></div>`).join('')}</div>`).join('')}
  </div></div>
  <div style="display:flex;align-items:center;gap:4px;margin-top:8px;flex-wrap:wrap;">
    <span style="font-size:10px;color:#888;">Lower ${mNames[chartMetric]||'value'}</span>
    ${[0,.25,.5,.75,1].map(t=>`<div style="width:12px;height:12px;border-radius:2px;background:${gc(vMin+t*(vMax-vMin))};"></div>`).join('')}
    <span style="font-size:10px;color:#888;">Higher &nbsp;·&nbsp; <span style="display:inline-block;width:10px;height:10px;background:#e5e7eb;border-radius:2px;vertical-align:middle;"></span> No data</span>
  </div></div>`;
}

        color='#4338ca';
      }else{
        data=fe.map(x=>x[fitChartMetric]??null);
        color=fitChartMetric==='miles'?'#0891b2':'#7c3aed';
      }
      const valid=data.filter(v=>v!=null);
      if(!valid.length){ctx.fillStyle='#888';ctx.font='14px system-ui';ctx.textAlign='center';ctx.fillText('No '+fitChartMetric+' data.',W/2,H/2);}
      else{
        const PAD={t:14,r:14,b:32,l:46};const CW=W-PAD.l-PAD.r,CH=H-PAD.t-PAD.b;
        const vMin=fitChartMetric==='streak'?0:Math.floor(Math.min(...valid)*0.9);
        const vMax=fitChartMetric==='streak'?3:Math.ceil(Math.max(...valid)*1.1)||1;
        const vR=vMax-vMin||1;
        const N=labels.length;
        const xP=i=>PAD.l+(i/(Math.max(N-1,1)))*CW;
        const xB=i=>PAD.l+(i/N)*CW;
        const bW=()=>Math.max(2,CW/N*0.75);
        const yP=v=>PAD.t+(1-(v-vMin)/vR)*CH;
        ctx.strokeStyle='#e5e7eb';ctx.lineWidth=1;ctx.font='10px system-ui';ctx.fillStyle='#888';ctx.textAlign='right';
        for(let i=0;i<=5;i++){const v=vMin+(vR*i/5);const y=yP(v);ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(PAD.l+CW,y);ctx.stroke();ctx.fillText(Math.round(v*10)/10,PAD.l-4,y+3);}
        ctx.fillStyle='#888';ctx.textAlign='center';const step=Math.max(1,Math.ceil(N/7));
        labels.forEach((l,i)=>{if(i%step===0)ctx.fillText(l,xP(i),H-PAD.b+14);});
        if(fitChartMetric==='streak'){
          data.forEach((v,i)=>{if(v==null)return;ctx.fillStyle=color;ctx.fillRect(xB(i)+bW()*0.15,yP(v),bW(),yP(vMin)-yP(v));});
        }else{
          ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=2.5;let first=true;
          data.forEach((v,i)=>{if(v==null)return;first?(ctx.moveTo(xP(i),yP(v)),first=false):ctx.lineTo(xP(i),yP(v));});ctx.stroke();
          data.forEach((v,i)=>{if(v==null)return;ctx.beginPath();ctx.arc(xP(i),yP(v),4,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();});
        }
      }
    }
  }

  // PR chart
  const prcCanvas=document.getElementById('PRC');
  if(!prcCanvas)return;
  const wtLog=applyRange(getWtLog());
  const sel=document.getElementById('prChartEx');
  const ex=sel?sel.value:Object.keys(Object.fromEntries(wtLog.map(x=>[x.exercise,1])))[0];
  const dpr=window.devicePixelRatio||1;
  const W2=prcCanvas.parentElement?.clientWidth-4||300;const H2=240;
  prcCanvas.width=W2*dpr;prcCanvas.height=H2*dpr;prcCanvas.style.width=W2+'px';prcCanvas.style.height=H2+'px';
  const ctx2=prcCanvas.getContext('2d');ctx2.scale(dpr,dpr);
  ctx2.fillStyle='#fff';ctx2.fillRect(0,0,W2,H2);
  const byDate={};
  wtLog.filter(x=>x.exercise===ex).forEach(x=>{if(!byDate[x.date]||x.weight>byDate[x.date])byDate[x.date]=x.weight;});
  const dates=Object.keys(byDate).sort();
  if(!dates.length){ctx2.fillStyle='#888';ctx2.font='14px system-ui';ctx2.textAlign='center';ctx2.fillText(ex?'No data for '+ex:'Select an exercise',W2/2,H2/2);return;}
  const vals=dates.map(d=>byDate[d]);
  const PAD={t:14,r:14,b:32,l:46};const CW=W2-PAD.l-PAD.r,CH=H2-PAD.t-PAD.b;
  const vMin=Math.floor(Math.min(...vals)*0.9);const vMax=Math.ceil(Math.max(...vals)*1.1)||1;const vR=vMax-vMin||1;
  const N=dates.length;
  const xP=i=>PAD.l+(i/(Math.max(N-1,1)))*CW;const yP=v=>PAD.t+(1-(v-vMin)/vR)*CH;
  ctx2.strokeStyle='#e5e7eb';ctx2.lineWidth=1;ctx2.font='10px system-ui';ctx2.fillStyle='#888';ctx2.textAlign='right';
  for(let i=0;i<=5;i++){const v=vMin+(vR*i/5);const y=yP(v);ctx2.beginPath();ctx2.moveTo(PAD.l,y);ctx2.lineTo(PAD.l+CW,y);ctx2.stroke();ctx2.fillText(Math.round(v*10)/10,PAD.l-4,y+3);}
  ctx2.fillStyle='#888';ctx2.textAlign='center';const step=Math.max(1,Math.ceil(N/7));
  dates.forEach((d,i)=>{if(i%step===0)ctx2.fillText(fd(d),xP(i),H2-PAD.b+14);});
  ctx2.beginPath();ctx2.strokeStyle='#7c3aed';ctx2.lineWidth=2.5;let first=true;
  vals.forEach((v,i)=>{first?(ctx2.moveTo(xP(i),yP(v)),first=false):ctx2.lineTo(xP(i),yP(v));});ctx2.stroke();
  vals.forEach((v,i)=>{
    ctx2.beginPath();ctx2.arc(xP(i),yP(v),5,0,Math.PI*2);ctx2.fillStyle='#7c3aed';ctx2.fill();
    // Mark PRs in gold
    const isPR=i===0||v>Math.max(...vals.slice(0,i));
    if(isPR){ctx2.beginPath();ctx2.arc(xP(i),yP(v),8,0,Math.PI*2);ctx2.strokeStyle='#f59e0b';ctx2.lineWidth=2.5;ctx2.stroke();}
  });
}

function drawFlame(streakDays){
  const canvas=document.getElementById('flameCanvas');if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=200,H=200;
  ctx.clearRect(0,0,W,H);
  const intensity=Math.min(1,streakDays/30);
  const cx=W/2,baseY=H-20;
  if(streakDays===0){
    ctx.fillStyle='#e5e7eb';
    ctx.beginPath();ctx.moveTo(cx,baseY-10);ctx.lineTo(cx-15,baseY);ctx.lineTo(cx+15,baseY);ctx.closePath();ctx.fill();
    ctx.fillStyle='#888';ctx.font='13px system-ui';ctx.textAlign='center';ctx.fillText('No streak yet',cx,H-4);
    return;
  }
  const flameH=40+intensity*100;
  const grad=ctx.createRadialGradient(cx,baseY-flameH*0.3,5,cx,baseY,flameH*0.8);
  grad.addColorStop(0,'#fff7ed');grad.addColorStop(0.3,'#fbbf24');grad.addColorStop(0.6,'#f97316');grad.addColorStop(1,'rgba(239,68,68,0)');
  ctx.fillStyle=grad;
  ctx.beginPath();
  ctx.moveTo(cx,baseY-flameH);
  ctx.bezierCurveTo(cx+30,baseY-flameH*0.7,cx+25,baseY-flameH*0.3,cx+20,baseY);
  ctx.lineTo(cx-20,baseY);
  ctx.bezierCurveTo(cx-25,baseY-flameH*0.3,cx-30,baseY-flameH*0.7,cx,baseY-flameH);
  ctx.fill();
  // Inner flame
  const grad2=ctx.createRadialGradient(cx,baseY-flameH*0.2,2,cx,baseY-flameH*0.1,flameH*0.4);
  grad2.addColorStop(0,'#fef3c7');grad2.addColorStop(0.5,'#fde047');grad2.addColorStop(1,'rgba(251,191,36,0)');
  ctx.fillStyle=grad2;
  ctx.beginPath();
  ctx.moveTo(cx,baseY-flameH*0.7);
  ctx.bezierCurveTo(cx+12,baseY-flameH*0.4,cx+10,baseY-flameH*0.2,cx+8,baseY);
  ctx.lineTo(cx-8,baseY);
  ctx.bezierCurveTo(cx-10,baseY-flameH*0.2,cx-12,baseY-flameH*0.4,cx,baseY-flameH*0.7);
  ctx.fill();
  // Streak number
  ctx.fillStyle='#fff';ctx.font='bold 28px system-ui';ctx.textAlign='center';ctx.shadowColor='rgba(0,0,0,.3)';ctx.shadowBlur=4;
  ctx.fillText(streakDays,cx,baseY-flameH*0.3+10);ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.font='bold 12px system-ui';ctx.fillText('day streak',cx,baseY-flameH*0.3+28);
  // Base glow
  const glow=ctx.createRadialGradient(cx,baseY,0,cx,baseY,30);
  glow.addColorStop(0,'rgba(249,115,22,0.4)');glow.addColorStop(1,'rgba(249,115,22,0)');
  ctx.fillStyle=glow;ctx.beginPath();ctx.ellipse(cx,baseY,30,10,0,0,Math.PI*2);ctx.fill();
}

function drawRings(){
  const canvas=document.getElementById('ringsCanvas');if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=280,H=140;ctx.clearRect(0,0,W,H);
  const fe=getFitEntries();
  const now=new Date();const byDate={};fe.forEach(x=>{byDate[x.date]=x;});
  let exDone=0,wuDone=0,stDone=0;const ringTotal=7;
  for(let i=0;i<7;i++){const d=new Date(now);d.setDate(d.getDate()-i);const k=d.toISOString().split('T')[0];const e=byDate[k];if(e){if(e.exercise)exDone++;if(e.warmup)wuDone++;if(e.stretch)stDone++;}}
  const rings=[{val:exDone/ringTotal,color:'#ef4444',bg:'#fecaca',r:55},{val:wuDone/ringTotal,color:'#f59e0b',bg:'#fde68a',r:38},{val:stDone/ringTotal,color:'#10b981',bg:'#a7f3d0',r:21}];
  const cx=W/2,cy=H/2,sw=14;
  rings.forEach(ring=>{
    ctx.beginPath();ctx.arc(cx,cy,ring.r,0,Math.PI*2);ctx.strokeStyle=ring.bg;ctx.lineWidth=sw;ctx.stroke();
    if(ring.val>0){
      ctx.beginPath();ctx.arc(cx,cy,ring.r,-Math.PI/2,-Math.PI/2+ring.val*Math.PI*2);ctx.strokeStyle=ring.color;ctx.lineWidth=sw;ctx.lineCap='round';ctx.stroke();
    }
  });
}

function drawTree(streakDays){
  const canvas=document.getElementById('treeCanvas');if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=280,H=220;ctx.clearRect(0,0,W,H);
  const cx=W/2,groundY=H-20;
  const treeH=Math.min(160,30+streakDays*4);
  const leafCount=Math.min(40,streakDays*2);
  // Ground
  ctx.fillStyle='#86efac';ctx.fillRect(0,groundY,W,H-groundY);
  // Trunk
  const trunkH=Math.min(treeH*0.4,60);const trunkW=Math.max(6,10+streakDays*0.3);
  const grad=ctx.createLinearGradient(cx-trunkW,0,cx+trunkW,0);
  grad.addColorStop(0,'#92400e');grad.addColorStop(0.5,'#b45309');grad.addColorStop(1,'#92400e');
  ctx.fillStyle=grad;ctx.fillRect(cx-trunkW/2,groundY-trunkH,trunkW,trunkH);
  if(streakDays===0)return;
  // Branches and leaves
  const canopyY=groundY-trunkH;const canopyR=Math.min(80,20+streakDays*2.5);
  // Main canopy
  const leafGrad=ctx.createRadialGradient(cx,canopyY,5,cx,canopyY,canopyR);
  leafGrad.addColorStop(0,'#4ade80');leafGrad.addColorStop(0.6,'#22c55e');leafGrad.addColorStop(1,'#15803d');
  ctx.fillStyle=leafGrad;ctx.beginPath();ctx.arc(cx,canopyY,canopyR,0,Math.PI*2);ctx.fill();
  // Extra clusters for higher streaks
  if(streakDays>=7){
    ctx.fillStyle='#16a34a';ctx.beginPath();ctx.arc(cx-canopyR*0.5,canopyY+canopyR*0.2,canopyR*0.55,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+canopyR*0.5,canopyY+canopyR*0.2,canopyR*0.55,0,Math.PI*2);ctx.fill();
  }
  if(streakDays>=14){
    ctx.fillStyle='#15803d';ctx.beginPath();ctx.arc(cx,canopyY-canopyR*0.4,canopyR*0.5,0,Math.PI*2);ctx.fill();
  }
  // Flowers for long streaks
  if(streakDays>=21){
    const flowerPositions=[[cx-20,canopyY-10],[cx+25,canopyY+5],[cx-5,canopyY-25],[cx+10,canopyY+15],[cx-30,canopyY+10]];
    flowerPositions.forEach(([fx,fy])=>{
      ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(fx,fy,5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(fx,fy,2,0,Math.PI*2);ctx.fill();
    });
  }
}

window.importCSV=function(inp){
  const file=inp.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{

        const dt=new Date(ts);if(isNaN(dt))continue;
        const date=dt.toISOString().split('T')[0];const weight=parseFloat(wRaw);if(isNaN(weight))continue;
        results.push({date,weight:Math.round(weight*10)/10,time:dt.getHours()<12?'morning':'night',bodyFat:bfR&&bfR!=='--'?parseFloat(bfR):null,bmi:bmiR&&bmiR!=='--'?parseFloat(bmiR):null,visceralFat:visR&&visR!=='--'?parseFloat(visR):null,musclePct:musR&&musR!=='--'?parseFloat(musR):null,bmr:bmrR&&bmrR!=='--'?parseInt(bmrR):null,note:'',photo:null,_t:dt.getTime()});
      }
      const byDate={};results.forEach(r=>{if(!byDate[r.date]||r._t<byDate[r.date]._t)byDate[r.date]=r;});
      const parsed=Object.values(byDate).map(({_t,...r})=>r);
      if(!parsed.length){alert('No data found. Check the file format.');return;}
      const merged={};[...getEntries(),...parsed].forEach(r=>{merged[r.date]=r;});
      sl(pk('entries'),Object.values(merged).sort((a,b)=>a.date.localeCompare(b.date)));
      alert('Imported '+parsed.length+' entries!');render();
    }catch(err){alert('Import failed. Please check the file.');console.error(err);}
  };
  reader.readAsText(file);inp.value='';
};
