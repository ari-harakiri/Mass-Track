<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Mass Track</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#fef08a;--text:#111;--muted:#555;--faint:#888;
  --main:#1d4ed8;--accent:#dc2626;--trend:#dc2626;--goal-c:#f59e0b;
  --card:#fff;--inp:#fef9c3;--border:#111;--shadow:#111;
  --green:#16a34a;--purple:#7c3aed;--btntxt:#fff;--tab:#dc2626;--del:#dc2626;
}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;min-height:100vh;}
.wrap{max-width:480px;margin:0 auto;padding:20px 16px 60px;}
.card{background:var(--card);border:3px solid var(--border);border-radius:14px;box-shadow:4px 4px 0 var(--shadow);padding:16px;margin-bottom:14px;}
.card-main{background:var(--main);border:3px solid var(--border);border-radius:14px;box-shadow:4px 4px 0 var(--shadow);padding:14px 18px;margin-bottom:14px;}
input,select,button,textarea{font-family:inherit;}
.inp{background:var(--inp);border:2px solid var(--border);border-radius:9px;color:var(--text);padding:9px 12px;font-size:14px;outline:none;width:100%;}
.btn{background:var(--main);color:var(--btntxt);border:2px solid var(--border);border-radius:9px;padding:10px 16px;font-weight:700;font-size:14px;cursor:pointer;box-shadow:2px 2px 0 var(--shadow);width:100%;display:block;text-align:center;}
.btn-sm{padding:6px 12px;font-size:12px;width:auto;display:inline-block;}
.btn-red{background:var(--accent)!important;}
.btn-green{background:var(--green)!important;color:#fff!important;}
.btn-yellow{background:var(--bg)!important;color:var(--text)!important;}
.row{display:flex;gap:8px;margin-bottom:8px;}
.row .inp{flex:1;}
.tabs{display:flex;background:var(--card);border:3px solid var(--border);border-radius:12px;padding:4px;gap:4px;box-shadow:4px 4px 0 var(--shadow);margin-bottom:16px;}
.tab{flex:1;padding:7px 2px;border-radius:9px;border:2px solid transparent;cursor:pointer;font-weight:700;font-size:10px;background:transparent;color:var(--muted);}
.tab.on{background:var(--tab);color:#fff;border-color:var(--border);}
.pane{display:none;}.pane.on{display:block;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.sc{border:3px solid var(--border);border-radius:12px;padding:12px 14px;box-shadow:3px 3px 0 var(--shadow);}
.entry{background:var(--card);border:3px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:flex-start;box-shadow:3px 3px 0 var(--shadow);}
.del{background:var(--del);border:2px solid var(--border);color:#fff;cursor:pointer;font-size:14px;font-weight:700;padding:4px 10px;border-radius:8px;}
.sec{font-size:12px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;}
.err{color:var(--accent);font-size:12px;font-weight:600;margin-bottom:8px;display:none;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px;}
.chip{background:var(--inp);border:2px solid var(--border);border-radius:8px;padding:6px 10px;text-align:center;}
.chip-l{font-size:10px;color:var(--faint);text-transform:uppercase;font-weight:700;}
.chip-v{font-size:16px;font-weight:800;}
.chart-box{height:240px;margin-bottom:10px;position:relative;}
canvas{display:block;width:100%!important;}
.legend{display:flex;gap:12px;padding-left:4px;margin-top:6px;}
.li{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted);}
.ld{width:10px;height:10px;border-radius:2px;}
.ttime{display:flex;border:2px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:2px 2px 0 var(--shadow);flex-shrink:0;}
.ttime button{flex:1;padding:9px 14px;border:none;cursor:pointer;font-size:18px;background:var(--inp);}
.ttime button.am{background:var(--goal-c);}
.ttime button.pm{background:var(--main);color:#fff;}
.mtabs{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap;}
.mtab{padding:6px 10px;border-radius:8px;border:2px solid transparent;cursor:pointer;font-weight:700;font-size:10px;background:var(--card);color:var(--muted);}
.mtab.on{color:#fff;border-color:var(--border);}
.ph2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.pcrd{border:3px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:3px 3px 0 var(--shadow);}
.pcrd img{width:100%;aspect-ratio:1;object-fit:cover;display:block;}
.pinfo{padding:8px 10px;background:var(--card);display:flex;justify-content:space-between;align-items:center;}
.pbtn{background:#fff;border:3px solid var(--border);border-radius:14px;box-shadow:4px 4px 0 var(--shadow);padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;text-align:left;width:100%;margin-bottom:12px;}
.av{width:44px;height:44px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
#editPanel{display:none;margin-bottom:14px;}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ── storage ──────────────────────────────────────────────
function gl(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}}
function sl(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

// ── palette ───────────────────────────────────────────────
const PAL={
  primary: {name:'🟡 Primary',  bg:'#ffe600',text:'#111',muted:'#555',faint:'#888',main:'#1d4ed8',accent:'#dc2626',trend:'#dc2626',goalc:'#f59e0b',card:'#fff',inp:'#fff9c0',border:'#111',shadow:'#111',green:'#16a34a',purple:'#7c3aed',btntxt:'#fff',tab:'#dc2626',del:'#dc2626'},
  sunset:  {name:'🌅 Sunset',   bg:'#431407',text:'#fed7aa',muted:'#fb923c',faint:'#f97316',main:'#f97316',accent:'#e11d48',trend:'#fbbf24',goalc:'#fbbf24',card:'#7c2d12',inp:'#9a3412',border:'#fb923c',shadow:'#7c2d12',green:'#10b981',purple:'#c084fc',btntxt:'#fff',tab:'#e11d48',del:'#e11d48'},
  ocean:   {name:'🌊 Ocean',    bg:'#ecfeff',text:'#164e63',muted:'#0e7490',faint:'#0891b2',main:'#0891b2',accent:'#0e7490',trend:'#6366f1',goalc:'#34d399',card:'#fff',inp:'#cffafe',border:'#0891b2',shadow:'#164e63',green:'#34d399',purple:'#6366f1',btntxt:'#fff',tab:'#0891b2',del:'#0e7490'},
  forest:  {name:'🌲 Forest',   bg:'#f0fdf4',text:'#14532d',muted:'#166534',faint:'#16a34a',main:'#16a34a',accent:'#15803d',trend:'#84cc16',goalc:'#fbbf24',card:'#fff',inp:'#dcfce7',border:'#16a34a',shadow:'#14532d',green:'#15803d',purple:'#84cc16',btntxt:'#fff',tab:'#16a34a',del:'#15803d'},
  midnight:{name:'🌙 Midnight', bg:'#0f172a',text:'#f1f5f9',muted:'#94a3b8',faint:'#64748b',main:'#818cf8',accent:'#f472b6',trend:'#34d399',goalc:'#fbbf24',card:'#1e293b',inp:'#1e293b',border:'#fbbf24',shadow:'#000',green:'#34d399',purple:'#f472b6',btntxt:'#0f172a',tab:'#fbbf24',del:'#f472b6'},
  rose:    {name:'🌸 Rose',     bg:'#fff1f2',text:'#881337',muted:'#be123c',faint:'#e11d48',main:'#e11d48',accent:'#be123c',trend:'#9333ea',goalc:'#f59e0b',card:'#fff',inp:'#ffe4e6',border:'#e11d48',shadow:'#881337',green:'#10b981',purple:'#9333ea',btntxt:'#fff',tab:'#e11d48',del:'#be123c'},
  candy:   {name:'🍬 Candy',    bg:'#fdf4ff',text:'#581c87',muted:'#7e22ce',faint:'#9333ea',main:'#a855f7',accent:'#ec4899',trend:'#ec4899',goalc:'#f0abfc',card:'#fff',inp:'#fae8ff',border:'#a855f7',shadow:'#581c87',green:'#34d399',purple:'#ec4899',btntxt:'#fff',tab:'#a855f7',del:'#ec4899'},
  mono:    {name:'🖤 Mono',     bg:'#f5f5f5',text:'#111',muted:'#555',faint:'#888',main:'#111',accent:'#333',trend:'#888',goalc:'#aaa',card:'#fff',inp:'#e5e5e5',border:'#111',shadow:'#111',green:'#333',purple:'#555',btntxt:'#fff',tab:'#111',del:'#333'},
  soviet:  {name:'☭ Soviet',   bg:'#b91c1c',text:'#ffe600',muted:'#fde047',faint:'#fbbf24',main:'#ffe600',accent:'#ffe600',trend:'#fff',goalc:'#fff',card:'#7f1d1d',inp:'#6b1414',border:'#ffe600',shadow:'#000',green:'#fde047',purple:'#fbbf24',btntxt:'#7f1d1d',tab:'#ffe600',del:'#ffe600'},
  retro:   {name:'💻 Retro',   bg:'#0d0d0d',text:'#00ff41',muted:'#00cc33',faint:'#009922',main:'#00ff41',accent:'#00cc33',trend:'#00ff41',goalc:'#00aa22',card:'#0a1a0a',inp:'#0d1f0d',border:'#00ff41',shadow:'#003311',green:'#00aa22',purple:'#00cc33',btntxt:'#0d0d0d',tab:'#00ff41',del:'#00cc33'},
};
const COLORS=['#1d4ed8','#dc2626','#16a34a','#7c3aed','#f59e0b'];
const ICONS=['⭐','🌙','🌸','🔥','💪','🐾','🌊','🎯','🦋','🌈','🍀','⚡','🎵','🏆','🌺','🦊','🐬','❄️','💎','🌻'];
const MAX=5;

// ── state ─────────────────────────────────────────────────
let profiles=gl('wt_profiles',[{id:'p0',name:'Me',icon:'⭐',palette:'primary'}]);
let profile=null;
let palette='primary';
let tab='chart';
let metric='weight';
let ctype='line';
let ctime='morning';
let dfrom='';
let dto='';
let dpreset='all';
let chartInst=null;

function pk(k){return'wt_'+profile.id+'_'+k;}
function gE(){return gl(pk('entries'),[]);}
function gM(){return gl(pk('meas'),[]);}
function gG(){return gl(pk('goal'),150);}
function gB(){return gl(pk('bfgoal'),25);}
function sE(v){sl(pk('entries'),v);}
function sM(v){sl(pk('meas'),v);}
function sG(v){sl(pk('goal'),v);}
function sB(v){sl(pk('bfgoal'),v);}

function p(){return PAL[palette]||PAL.primary;}

function sorted(e){return[...e].sort((a,b)=>a.date.localeCompare(b.date));}

function filtered(e){
  let s=sorted(e);
  if(dpreset==='custom'){
    if(dfrom)s=s.filter(x=>x.date>=dfrom);
    if(dto)s=s.filter(x=>x.date<=dto);
  } else if(dpreset!=='all'){
    const days={week:7,month:30,three:90,six:180,year:365}[dpreset];
    if(days){const f=new Date();f.setDate(f.getDate()-days);const fs=f.toISOString().split('T')[0];s=s.filter(x=>x.date>=fs);}
  }
  return s;
}

function mavg(data,key,w=5){
  return data.map((d,i)=>{
    const sl=data.slice(Math.max(0,i-w+1),i+1).filter(x=>x[key]!=null);
    return Object.assign({},d,{[key+'T']:sl.length?parseFloat((sl.reduce((s,x)=>s+x[key],0)/sl.length).toFixed(2)):null});
  });
}

function bmiCat(b){
  if(!b)return null;const n=parseFloat(b);
  if(n<18.5)return{l:'Underweight',c:'#3b82f6'};
  if(n<25)return{l:'Normal',c:'#16a34a'};
  if(n<30)return{l:'Overweight',c:'#f59e0b'};
  return{l:'Obese',c:'#dc2626'};
}
function bfCat(b){
  if(!b)return null;const n=parseFloat(b);
  if(n<14)return{l:'Essential',c:'#3b82f6'};
  if(n<21)return{l:'Athletic',c:'#16a34a'};
  if(n<25)return{l:'Fitness',c:'#84cc16'};
  if(n<32)return{l:'Average',c:'#f59e0b'};
  return{l:'Obese',c:'#dc2626'};
}
function fd(d){const[,m,day]=d.split('-');return m+'/'+day;}

const MDEFS={
  weight:    {lbl:'⚖️ Weight',  unit:'lbs'},
  bodyFat:   {lbl:'🔥 Body Fat',unit:'%'},
  musclePct: {lbl:'💪 Muscle',  unit:'%'},
  visceralFat:{lbl:'🫀 Visceral',unit:''},
};

// ── apply palette ─────────────────────────────────────────
function applyPal(){
  const q=p(),r=document.documentElement;
  const m={
    '--bg':q.bg,'--text':q.text,'--muted':q.muted,'--faint':q.faint,
    '--main':q.main,'--accent':q.accent,'--trend':q.trend,'--goal-c':q.goalc,
    '--card':q.card,'--inp':q.inp,'--border':q.border,'--shadow':q.shadow,
    '--green':q.green,'--purple':q.purple,'--btntxt':q.btntxt,
    '--tab':q.tab,'--del':q.del
  };
  for(const[k,v]of Object.entries(m))r.style.setProperty(k,v);
  document.body.style.background=q.bg;
  document.body.style.color=q.text;
}

// ── stats ─────────────────────────────────────────────────
function stats(e){
  const s=sorted(e);if(!s.length)return null;
  const ws=s.map(x=>x.weight);
  const bfs=s.map(x=>x.bodyFat).filter(Boolean);
  const cur=ws[ws.length-1];const last=s[s.length-1];
  return{
    cur,min:Math.min(...ws),max:Math.max(...ws),
    avg:(ws.reduce((a,b)=>a+b,0)/ws.length).toFixed(1),
    chg:(cur-ws[0]).toFixed(1),
    bf:last.bodyFat,bmi:last.bmi,muscle:last.musclePct,
    visceral:last.visceralFat,bmr:last.bmr,
    bfMin:bfs.length?Math.min(...bfs).toFixed(1):null,
    bfMax:bfs.length?Math.max(...bfs).toFixed(1):null,
    bfChg:bfs.length>1?(last.bodyFat-bfs[0]).toFixed(1):null,
  };
}

// ── render ────────────────────────────────────────────────
function render(){
  applyPal();
  document.getElementById('root').innerHTML=profile?renderApp():renderProfiles();
  if(profile&&tab==='chart')setTimeout(drawChart,0);
}

// ── profiles page ─────────────────────────────────────────
function renderProfiles(){
  const cnt=id=>{try{const e=JSON.parse(localStorage.getItem('wt_'+id+'_entries'));return e?e.length+' readings':'No data';}catch{return'No data';}};
  return`<div class="wrap">
  <div style="font-size:11px;letter-spacing:.18em;color:var(--accent);text-transform:uppercase;font-weight:700;margin-bottom:6px;">Mass Track</div>
  <div style="font-size:28px;font-weight:900;margin-bottom:6px;">Who's tracking?</div>
  <div style="font-size:13px;color:var(--muted);margin-bottom:20px;">Tap your name to continue.</div>
  ${profiles.map((q,i)=>`
    <button class="pbtn" onclick="selProf('${q.id}')">
      <div class="av" style="background:${COLORS[i%5]};">${q.icon||'⭐'}</div>
      <div style="text-align:left;">
        <div style="font-size:17px;font-weight:800;">${q.name}</div>
        <div style="font-size:11px;color:var(--muted);">${cnt(q.id)}</div>
      </div>
      <div style="margin-left:auto;">
        <button onclick="event.stopPropagation();openEdit('${q.id}')" style="background:var(--inp);border:2px solid var(--border);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:14px;">✏️</button>
        ${profiles.length>1?`<button onclick="event.stopPropagation();delProf('${q.id}')" style="background:var(--del);border:2px solid var(--border);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:14px;color:#fff;margin-left:4px;">🗑️</button>`:''}
      </div>
    </button>
  `).join('')}
  <div class="card" id="editPanel">
    <div class="sec">Edit Profile</div>
    <input id="eName" class="inp" placeholder="Name" style="margin-bottom:10px;">
    <div style="font-size:11px;color:var(--faint);font-weight:700;margin-bottom:6px;">Icon:</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;" id="iconPicker"></div>
    <div style="font-size:11px;color:var(--faint);font-weight:700;margin-bottom:6px;">Theme:</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;" id="themePicker"></div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-sm" onclick="saveEdit()">Save</button>
      <button class="btn btn-sm btn-yellow" style="border:2px solid var(--border);" onclick="closeEdit()">Cancel</button>
    </div>
  </div>
  ${profiles.length<MAX?`<button class="btn btn-green" onclick="addProf()">+ Add person (${profiles.length}/${MAX})</button>`:''}
  </div>`;
}

// ── main app ──────────────────────────────────────────────
function renderApp(){
  const e=gE(),g=gG(),bf=gB(),ms=gM();
  const s=sorted(e),st=stats(e);
  const bmiI=st?.bmi?bmiCat(st.bmi):null;
  const bfI=st?.bf?bfCat(st.bf):null;
  const toG=st?(st.cur-g).toFixed(1):null;
  const q=p();

  return`<div class="wrap">
  <input type="file" id="csvF" accept=".csv" style="display:none;" onchange="impCSV(this)">
  <input type="file" id="photoF" accept="image/*" style="display:none;" onchange="upPhoto(this)">

  <!-- header -->
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;">
    <div>
      <button onclick="goProfiles()" style="background:none;border:none;cursor:pointer;font-size:11px;letter-spacing:.18em;color:var(--accent);text-transform:uppercase;font-weight:700;padding:0;margin-bottom:4px;">← Profiles</button>
      <div style="font-size:22px;font-weight:900;">${profile.name}</div>
      <div style="font-size:30px;font-weight:900;color:var(--main);">${st?st.cur+' lbs':'No data yet'}</div>
      ${st?`<div style="font-size:13px;color:var(--muted);">${parseFloat(st.chg)<0?'↓ '+Math.abs(st.chg):'↑ '+st.chg} lbs${st.bf?' · '+st.bf+'% BF':''}${st.bmr?' · '+st.bmr+' BMR':''}</div>`:''}
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;margin-top:4px;">
      <button class="btn btn-sm btn-green" onclick="document.getElementById('csvF').click()">📥 CSV</button>
      <button class="btn btn-sm btn-red" onclick="window.print()">🖨️ Print</button>
    </div>
  </div>

  <!-- body comp toggle -->
  <button onclick="toggleBC()" id="bcBtn" class="btn btn-yellow" style="border:3px solid var(--border);box-shadow:3px 3px 0 var(--shadow);font-size:13px;margin-bottom:10px;">
    ▸ Body Composition${st?.bmi?' — BMI '+st.bmi+(bmiI?' ('+bmiI.l+')':''):''}${st?.bf?' · '+st.bf+'%':''}
  </button>
  <div id="bcPanel" style="display:none;" class="card">
    <div class="g2" style="margin-bottom:10px;">
      ${[
        {l:'BMI',v:st?.bmi??'—',c:bmiI?.c??'var(--main)',sub:bmiI?.l},
        {l:'Body Fat',v:st?.bf?st.bf+'%':'—',c:bfI?.c??'var(--main)',sub:bfI?.l},
        {l:'Muscle %',v:st?.muscle?st.muscle+'%':'—',c:q.green,sub:null},
        {l:'Visceral',v:st?.visceral??'—',c:st?.visceral>=10?q.accent:q.goalc,sub:st?.visceral>=10?'High':'Normal'},
      ].map(x=>`<div style="background:var(--inp);border:2px solid var(--border);border-radius:12px;padding:12px 14px;">
        <div style="font-size:10px;color:var(--faint);text-transform:uppercase;font-weight:700;margin-bottom:2px;">${x.l}</div>
        <div style="font-size:22px;font-weight:900;color:${x.c};">${x.v}</div>
        ${x.sub?`<div style="font-size:11px;color:${x.c};font-weight:600;">${x.sub}</div>`:''}
      </div>`).join('')}
    </div>
    ${st?.bmi?`<div style="margin-bottom:10px;">
      <div style="font-size:11px;color:var(--faint);font-weight:700;margin-bottom:4px;">BMI Scale</div>
      <div style="height:10px;border-radius:6px;background:linear-gradient(90deg,#3b82f6 0%,#16a34a 30%,#f59e0b 65%,#dc2626 100%);border:2px solid var(--border);position:relative;">
        <div style="position:absolute;top:-4px;left:${Math.min(98,Math.max(2,((parseFloat(st.bmi)-15)/25)*100))}%;width:10px;height:18px;background:var(--border);border-radius:3px;transform:translateX(-50%);"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--faint);margin-top:2px;"><span>15</span><span>18.5</span><span>25</span><span>30</span><span>40</span></div>
    </div>`:''}
    ${st?.bf?`<div>
      <div style="font-size:11px;color:var(--faint);font-weight:700;margin-bottom:4px;">Body Fat Scale (Female)</div>
      <div style="height:10px;border-radius:6px;background:linear-gradient(90deg,#3b82f6 0%,#16a34a 25%,#84cc16 45%,#f59e0b 70%,#dc2626 100%);border:2px solid var(--border);position:relative;">
        <div style="position:absolute;top:-4px;left:${Math.min(98,Math.max(2,((parseFloat(st.bf)-10)/35)*100))}%;width:10px;height:18px;background:var(--border);border-radius:3px;transform:translateX(-50%);"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--faint);margin-top:2px;"><span>14%</span><span>21%</span><span>25%</span><span>32%</span><span>45%</span></div>
    </div>`:''}
  </div>

  <!-- goal -->
  <div class="card-main" style="display:flex;justify-content:space-between;align-items:center;gap:12px;">
    <div>

// ── special charts ────────────────────────────────────────
function renderRing(s,g,bf,st){
  if(!st)return'<div class="card" style="text-align:center;padding:40px 0;color:var(--muted);">No data yet.</div>';
  const q=p();
  const start=s[0]?.weight??st.cur;
  const lost=start-st.cur;
  const pct=Math.min(100,Math.max(0,((start-g)>0?(lost/(start-g))*100:0)));
  const r=70,cx=120,cy=100,sw=22,circ=2*Math.PI*r;
  const bfStart=s.find(x=>x.bodyFat)?.bodyFat;
  const bfPct=bfStart&&st.bf&&bf<bfStart?Math.min(100,Math.max(0,((bfStart-st.bf)/(bfStart-bf))*100)):null;
  return`<div class="card"><div style="display:flex;justify-content:space-around;flex-wrap:wrap;gap:8px;">
    <div style="text-align:center;">
      <svg width="240" height="200">
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${q.border}33" stroke-width="${sw}"/>
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${pct>=100?q.green:q.main}" stroke-width="${sw}" stroke-dasharray="${(pct/100)*circ} ${circ}" stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})"/>
        <text x="${cx}" y="${cy-10}" text-anchor="middle" font-size="26" font-weight="900" fill="${q.text}">${Math.round(pct)}%</text>
        <text x="${cx}" y="${cy+12}" text-anchor="middle" font-size="12" fill="${q.muted}">to goal</text>
        <text x="${cx}" y="${cy+30}" text-anchor="middle" font-size="10" fill="${q.faint}">${st.cur} → ${g} lbs</text>
        <text x="${cx}" y="${cy+48}" text-anchor="middle" font-size="11" fill="${lost>=0?q.green:q.accent}" font-weight="700">${lost>=0?'↓ '+lost.toFixed(1)+' lbs lost':'↑ '+Math.abs(lost).toFixed(1)+' lbs gained'}</text>
      </svg>
      <div style="font-size:12px;font-weight:700;color:var(--muted);">⚖️ Weight Goal</div>
    </div>
    ${bfPct!==null?`<div style="text-align:center;">
      <svg width="240" height="200">
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${q.border}33" stroke-width="${sw}"/>
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${bfPct>=100?q.green:q.purple}" stroke-width="${sw}" stroke-dasharray="${(bfPct/100)*circ} ${circ}" stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})"/>
        <text x="${cx}" y="${cy-10}" text-anchor="middle" font-size="26" font-weight="900" fill="${q.text}">${Math.round(bfPct)}%</text>
        <text x="${cx}" y="${cy+12}" text-anchor="middle" font-size="12" fill="${q.muted}">to BF goal</text>
        <text x="${cx}" y="${cy+48}" text-anchor="middle" font-size="11" fill="${q.purple}" font-weight="700">Now: ${st.bf}%</text>
      </svg>
      <div style="font-size:12px;font-weight:700;color:var(--muted);">🔥 BF Goal</div>
    </div>`:''}
  </div></div>`;
}

function renderHeatmap(s){
  const q=p();
  const byDate={};s.forEach(x=>{if(x[metric]!=null)byDate[x.date]=x[metric];});
  const vals=Object.values(byDate).filter(Boolean);
  const vMin=vals.length?Math.min(...vals):0,vMax=vals.length?Math.max(...vals):1;
  const today=new Date(),start=new Date(today);
  start.setDate(start.getDate()-7*26+1);start.setDate(start.getDate()-start.getDay());
  const weeks=[];
  for(let w=0;w<26;w++){const wk=[];for(let d=0;d<7;d++){const dt=new Date(start);dt.setDate(start.getDate()+w*7+d);const k=dt.toISOString().split('T')[0];wk.push({date:k,v:byDate[k]??null});}weeks.push(wk);}
  const gc=v=>{if(v==null)return q.inp;const t=(v-vMin)/(vMax-vMin||1);return`rgb(${Math.round(22+t*198)},${Math.round(163-t*125)},${Math.round(74-t*74)})`};
  const cs=11,gap=2;
  return`<div class="card">
    <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px;">🗓️ Last 6 months</div>
    <div style="overflow-x:auto;"><div style="display:flex;gap:${gap}px;">
      <div style="display:flex;flex-direction:column;gap:${gap}px;margin-right:2px;">
        ${['S','M','T','W','T','F','S'].map(d=>`<div style="height:${cs}px;font-size:8px;color:var(--faint);display:flex;align-items:center;">${d}</div>`).join('')}
      </div>
      ${weeks.map(wk=>`<div style="display:flex;flex-direction:column;gap:${gap}px;">${wk.map(c=>`<div title="${c.date}${c.v!=null?': '+c.v:''}." style="width:${cs}px;height:${cs}px;border-radius:2px;background:${gc(c.v)};"></div>`).join('')}</div>`).join('')}
    </div></div>
    <div style="display:flex;align-items:center;gap:4px;margin-top:8px;">
      <span style="font-size:10px;color:var(--faint);">Less</span>
      ${[0,.25,.5,.75,1].map(t=>`<div style="width:12px;height:12px;border-radius:2px;background:${gc(vMin+t*(vMax-vMin))};"></div>`).join('')}
      <span style="font-size:10px;color:var(--faint);">More</span>
    </div>
  </div>`;
}

// ── canvas chart ──────────────────────────────────────────
function drawChart(){
  const canvas=document.getElementById('MC');
  if(!canvas)return;
  const e=gE(),g=gG(),bf=gB();
  const s=filtered(e);
  const q=p();
  const mdef=MDEFS[metric];
  const mcolor={'weight':q.main,'bodyFat':q.purple,'musclePct':q.green,'visceralFat':q.accent}[metric]||q.main;

  const dpr=window.devicePixelRatio||1;
  const W=canvas.parentElement.clientWidth-4;
  const H=240;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);

  if(!s.length){
    ctx.fillStyle=q.muted;ctx.font='14px system-ui';ctx.textAlign='center';
    ctx.fillText('Add entries to see your chart.',W/2,H/2);return;
  }

  const PAD={t:12,r:12,b:32,l:44};
  const CW=W-PAD.l-PAD.r,CH=H-PAD.t-PAD.b;

  // build data
  let labels,vals,trend,rateD,rateL,fatV,musV,othV;
  if(ctype==='stacked'){
    const sd=s.filter(d=>d.bodyFat!=null&&d.musclePct!=null);
    if(sd.length<2){ctx.fillStyle=q.muted;ctx.font='13px system-ui';ctx.textAlign='center';ctx.fillText('Need body fat data.',W/2,H/2);return;}
    labels=sd.map(d=>fd(d.date));
    fatV=sd.map(d=>parseFloat((d.weight*d.bodyFat/100).toFixed(1)));
    musV=sd.map(d=>parseFloat((d.weight*d.musclePct/100).toFixed(1)));
    othV=sd.map(d=>Math.max(0,parseFloat((d.weight*(1-d.bodyFat/100-d.musclePct/100)).toFixed(1))));
  } else if(ctype==='rate'){
    rateD=[];rateL=[];
    for(let i=1;i<s.length;i++){
      const prev=s[i-1],curr=s[i];
      const days=(new Date(curr.date)-new Date(prev.date))/86400000;
      if(days>0&&days<=14){rateD.push(parseFloat(((curr.weight-prev.weight)/days*7).toFixed(2)));rateL.push(fd(curr.date));}
    }
    if(rateD.length<2){ctx.fillStyle=q.muted;ctx.font='13px system-ui';ctx.textAlign='center';ctx.fillText('Need more entries.',W/2,H/2);return;}
  } else {
    const data=mavg(s,metric);
    labels=data.map(d=>fd(d.date));
    vals=data.map(d=>d[metric]);
    trend=data.map(d=>d[metric+'T']);
  }

  // y range
  const cGoal=metric==='weight'?g:metric==='bodyFat'?bf:null;
  let allN=[];
  if(ctype==='stacked')allN=[...fatV,...musV,...othV].map((_,i)=>(fatV[i]||0)+(musV[i]||0)+(othV[i]||0));
  else if(ctype==='rate')allN=rateD;
  else allN=[...(vals||[]),...(trend||[])].filter(v=>v!=null);
  if(cGoal)allN.push(cGoal);
  const vMin=allN.length?Math.floor(Math.min(...allN)-2):0;
  const vMax=allN.length?Math.ceil(Math.max(...allN)+2):100;
  const vR=vMax-vMin||1;

  const lbs=ctype==='rate'?rateL:labels;
  const N=lbs?.length||1;

  const xP=i=>PAD.l+(i/(Math.max(N-1,1)))*CW;
  const xB=i=>PAD.l+(i/N)*CW;
  const bW=()=>Math.max(2,CW/N*0.7);
  const yP=v=>PAD.t+(1-(v-vMin)/vR)*CH;

  // grid
  ctx.strokeStyle=q.border+'33';ctx.lineWidth=1;
  ctx.font='10px system-ui';ctx.fillStyle=q.faint;ctx.textAlign='right';
  for(let i=0;i<=5;i++){
    const v=vMin+(vR*i/5);const y=yP(v);
    ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(PAD.l+CW,y);ctx.stroke();
    ctx.fillText(Math.round(v),PAD.l-4,y+3);
  }
  // x labels
  ctx.fillStyle=q.faint;ctx.textAlign='center';
  const step=Math.max(1,Math.ceil(N/7));
  lbs?.forEach((l,i)=>{if(i%step===0)ctx.fillText(l,xP(i),H-PAD.b+14);});

  // zero line for rate
  if(ctype==='rate'){ctx.strokeStyle=q.border;ctx.lineWidth=1.5;ctx.setLineDash([]);ctx.beginPath();ctx.moveTo(PAD.l,yP(0));ctx.lineTo(PAD.l+CW,yP(0));ctx.stroke();}

  // goal line
  if(cGoal&&ctype!=='stacked'&&ctype!=='rate'){
    ctx.strokeStyle=q.goalc;ctx.lineWidth=1.5;ctx.setLineDash([5,3]);
    ctx.beginPath();ctx.moveTo(PAD.l,yP(cGoal));ctx.lineTo(PAD.l+CW,yP(cGoal));ctx.stroke();
    ctx.setLineDash([]);ctx.fillStyle=q.goalc;ctx.textAlign='right';ctx.font='10px system-ui';
    ctx.fillText('Goal '+cGoal,PAD.l+CW,yP(cGoal)-4);
  }

  ctx.setLineDash([]);

  if(ctype==='bar'){
    vals.forEach((v,i)=>{if(v==null)return;ctx.fillStyle=mcolor;ctx.fillRect(xB(i)+bW()*0.15,yP(v),bW(),yP(vMin)-yP(v));});
  } else if(ctype==='stacked'){
    fatV.forEach((_,i)=>{
      let base=vMin;
      [[fatV[i],q.accent],[musV[i],q.green],[othV[i],'#93c5fd']].forEach(([v,c])=>{
        if(!v)return;ctx.fillStyle=c;ctx.fillRect(xB(i)+bW()*0.15,yP(base+v),bW(),yP(base)-yP(base+v));base+=v;
      });
    });
  } else if(ctype==='rate'){
    rateD.forEach((v,i)=>{
      ctx.fillStyle=v<=0?q.green:q.accent;
      const y=v<=0?yP(v):yP(0),h=Math.abs(yP(0)-yP(v));
      ctx.fillRect(xB(i)+bW()*0.15,y,bW(),Math.max(2,h));
    });
  } else {
    if(ctype==='combo'){
      vals.forEach((v,i)=>{if(v==null)return;ctx.fillStyle=mcolor+'99';ctx.fillRect(xB(i)+bW()*0.15,yP(v),bW(),yP(vMin)-yP(v));});
    }
    if(ctype==='area'&&vals.filter(v=>v!=null).length>1){
      ctx.beginPath();let first=true;
      vals.forEach((v,i)=>{if(v==null)return;first?(ctx.moveTo(xP(i),yP(v)),first=false):ctx.lineTo(xP(i),yP(v));});
      ctx.lineTo(xP(vals.length-1),yP(vMin));ctx.lineTo(xP(vals.findIndex(v=>v!=null)),yP(vMin));
      ctx.closePath();ctx.fillStyle=mcolor+'33';ctx.fill();
    }
    if(ctype==='scatter'){
      vals.forEach((v,i)=>{if(v==null)return;ctx.beginPath();ctx.arc(xP(i),yP(v),5,0,Math.PI*2);ctx.fillStyle=mcolor;ctx.fill();ctx.strokeStyle=q.border;ctx.lineWidth=1.5;ctx.stroke();});
    } else {
      ctx.beginPath();ctx.strokeStyle=mcolor;ctx.lineWidth=2.5;let first=true;
      vals.forEach((v,i)=>{if(v==null)return;first?(ctx.moveTo(xP(i),yP(v)),first=false):ctx.lineTo(xP(i),yP(v));});
      ctx.stroke();
      vals.forEach((v,i)=>{if(v==null)return;ctx.beginPath();ctx.arc(xP(i),yP(v),4,0,Math.PI*2);ctx.fillStyle=mcolor;ctx.fill();ctx.strokeStyle=q.border;ctx.lineWidth=1.5;ctx.stroke();});
    }
    if(trend&&trend.filter(v=>v!=null).length>1){
      ctx.beginPath();ctx.setLineDash([4,2]);ctx.strokeStyle=q.trend;ctx.lineWidth=1.5;let first=true;
      trend.forEach((v,i)=>{if(v==null)return;first?(ctx.moveTo(xP(i),yP(v)),first=false):ctx.lineTo(xP(i),yP(v));});
      ctx.stroke();ctx.setLineDash([]);
    }
  }

  const leg=document.getElementById('LEG');
  if(leg){
    if(ctype==='stacked')leg.innerHTML=`<div class="li"><div class="ld" style="background:${q.accent};"></div>Fat</div><div class="li"><div class="ld" style="background:${q.green};"></div>Muscle</div><div class="li"><div class="ld" style="background:#93c5fd;"></div>Other</div>`;
    else if(ctype==='rate')leg.innerHTML=`<div class="li"><div class="ld" style="background:${q.green};"></div>Lost</div><div class="li"><div class="ld" style="background:${q.accent};"></div>Gained</div>`;
    else leg.innerHTML=`<div class="li"><div class="ld" style="background:${mcolor};"></div>Actual</div><div class="li"><div class="ld" style="background:${q.trend};"></div>Trend</div>${cGoal?`<div class="li"><div class="ld" style="background:${q.goalc};"></div>Goal</div>`:''}`;
  }
}

// ── events ────────────────────────────────────────────────
window.selProf=function(id){
  profile=profiles.find(x=>x.id===id);
  palette=profile.palette||'primary';
  sl('wt_last',profile);
  render();
};
window.goProfiles=function(){profile=null;palette='primary';render();};
window.addProf=function(){
  if(profiles.length>=MAX){alert('Max 5 profiles.');return;}
  const id='p'+Date.now();
  profiles=[...profiles,{id,name:'New Person',icon:'⭐',palette:'primary'}];
  sl('wt_profiles',profiles);render();
  setTimeout(()=>openEdit(id),50);
};
window.delProf=function(id){
  if(!confirm('Delete this profile and all data?'))return;
  ['entries','meas','goal','bfgoal'].forEach(k=>{try{localStorage.removeItem('wt_'+id+'_'+k);}catch{}});
  profiles=profiles.filter(x=>x.id!==id);sl('wt_profiles',profiles);render();
};

let _editId=null,_pendIcon=null,_pendPal=null;
window.openEdit=function(id){
  _editId=id;_pendIcon=null;_pendPal=null;
  const q=profiles.find(x=>x.id===id);
  document.getElementById('editPanel').style.display='block';
  document.getElementById('eName').value=q.name;
  // icon picker
  document.getElementById('iconPicker').innerHTML=ICONS.map(ic=>`
    <button id="ic-${ic}" onclick="pickIcon('${ic}')" style="width:38px;height:38px;border-radius:8px;font-size:18px;cursor:pointer;border:${(q.icon||'⭐')===ic?'3px solid var(--border)':'2px solid transparent'};background:${(q.icon||'⭐')===ic?'var(--goal-c)':'var(--inp)'};">${ic}</button>
  `).join('');
  // theme picker
  document.getElementById('themePicker').innerHTML=Object.entries(PAL).map(([k,v])=>`
    <button id="th-${k}" onclick="pickTheme('${k}')" style="display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:9px;border:${(q.palette||'primary')===k?'3px solid var(--border)':'2px solid transparent'};cursor:pointer;background:${v.bg};font-size:11px;font-weight:700;color:${v.text};font-family:inherit;">
      <div style="width:12px;height:12px;border-radius:50%;background:${v.main};flex-shrink:0;border:1px solid rgba(0,0,0,.2);"></div>${v.name}
    </button>
  `).join('');
};
window.closeEdit=function(){document.getElementById('editPanel').style.display='none';_editId=_pendIcon=_pendPal=null;};
window.pickIcon=function(ic){
  _pendIcon=ic;
  document.querySelectorAll('[id^="ic-"]').forEach(b=>{b.style.border='2px solid transparent';b.style.background='var(--inp)';});
  const b=document.getElementById('ic-'+ic);if(b){b.style.border='3px solid var(--border)';b.style.background='var(--goal-c)';}
};
window.pickTheme=function(k){
  _pendPal=k;
  document.querySelectorAll('[id^="th-"]').forEach(b=>b.style.border='2px solid transparent');
  const b=document.getElementById('th-'+k);if(b)b.style.border='3px solid var(--border)';
};
window.saveEdit=function(){
  const name=document.getElementById('eName').value.trim();if(!name)return;
  const ic=_pendIcon||(profiles.find(x=>x.id===_editId)?.icon||'⭐');
  const pal=_pendPal||(profiles.find(x=>x.id===_editId)?.palette||'primary');
  profiles=profiles.map(x=>x.id===_editId?{...x,name,icon:ic,palette:pal}:x);
  sl('wt_profiles',profiles);
  if(profile?.id===_editId){profile={...profile,name,icon:ic,palette:pal};palette=pal;sl('wt_last',profile);}
  closeEdit();render();
};
window.toggleBC=function(){
  const el=document.getElementById('bcPanel');
  const btn=document.getElementById('bcBtn');
  const open=el.style.display==='none';
  el.style.display=open?'block':'none';
  btn.textContent=(open?'▾':'▸')+btn.textContent.slice(1);
};
window.editGoal=function(){document.getElementById('gDisp').style.display='none';document.getElementById('gEdit').style.display='block';};
window.saveGoal=function(){const g=parseFloat(document.getElementById('gInp').value);if(!isNaN(g)&&g>0){sG(g);}document.getElementById('gDisp').textContent=gG()+' lbs';document.getElementById('gDisp').style.display='block';document.getElementById('gEdit').style.display='none';render();};
window.setTab=function(t){tab=t;render();};
window.setMetric=function(m){metric=m;render();};
window.setTime=function(t){ctime=t;document.getElementById('bAM').className=t==='morning'?'am':'';document.getElementById('bPM').className=t==='night'?'pm':'';};
window.setDP=function(k){dpreset=k;if(k!=='custom'){dfrom='';dto='';}render();};
window.addEntry=function(){
  const date=document.getElementById('lDate').value;
  const wt=parseFloat(document.getElementById('lWt').value);
  const bf=document.getElementById('lBf').value!==''?parseFloat(document.getElementById('lBf').value):null;
  const note=document.getElementById('lNote').value;
  const err=document.getElementById('lErr');
  if(isNaN(wt)||wt<50||wt>600){err.textContent='Enter weight between 50–600 lbs.';err.style.display='block';return;}
  if(bf!==null&&(isNaN(bf)||bf<1||bf>70)){err.textContent='Body fat must be 1–70%.';err.style.display='block';return;}
  err.style.display='none';
  let e=gE().filter(x=>x.date!==date);
  e.push({date,weight:wt,bodyFat:bf,note,time:ctime,photo:null});
  sE(e);render();
};
window.delEntry=function(date){sE(gE().filter(x=>x.date!==date));render();};
window.addMeas=function(){
  const date=document.getElementById('mDate').value;
  const fields=['Chest','Waist','Hips','Arms','Thighs'];
  const entry={date};
  fields.forEach(f=>{const v=document.getElementById('m'+f).value;if(v!=='')entry[f.toLowerCase()]=parseFloat(v);});
  let m=gM().filter(x=>x.date!==date);m.push(entry);sM(m);render();
};
window.delMeas=function(date){sM(gM().filter(x=>x.date!==date));render();};
window.trigPhoto=function(){const d=document.getElementById('pSel').value;if(!d)return;window._photoDate=d;document.getElementById('photoF').click();};
window.upPhoto=function(inp){
  const file=inp.files[0];if(!file||!window._photoDate)return;
  const reader=new FileReader();
  reader.onload=ev=>{sE(gE().map(x=>x.date===window._photoDate?{...x,photo:ev.target.result}:x));render();};
  reader.readAsDataURL(file);
};
window.delPhoto=function(date){sE(gE().map(x=>x.date===date?{...x,photo:null}:x));render();};
window.impCSV=function(inp){
  const file=inp.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const lines=ev.target.result.trim().split('\n');
      const results=[];
      for(let i=1;i<lines.length;i++){
        const row=lines[i].replace(/^"|"$/g,'').split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/);
        if(row.length<2)continue;
        const timeStr=row[0].replace(/"/g,'').trim();
        const wRaw=row[1].replace(/lb/gi,'').trim();
        const bfRaw=row[3]?.replace(/%/g,'').trim();
        const visRaw=row[6]?.trim();
        const musRaw=row[8]?.replace(/%/g,'').trim();
        const bmrRaw=row[12]?.replace(/kcal/gi,'').trim();
        const bmiRaw=row[2]?.trim();
        const dt=new Date(timeStr);if(isNaN(dt))continue;
        const date=dt.toISOString().split('T')[0];
        const weight=parseFloat(wRaw);if(isNaN(weight))continue;
        results.push({date,weight:Math.round(weight*10)/10,time:dt.getHours()<12?'morning':'night',
          bodyFat:bfRaw&&bfRaw!=='--'?parseFloat(bfRaw):null,
          bmi:bmiRaw&&bmiRaw!=='--'?parseFloat(bmiRaw):null,
          visceralFat:visRaw&&visRaw!=='--'?parseFloat(visRaw):null,
          musclePct:musRaw&&musRaw!=='--'?parseFloat(musRaw):null,
          bmr:bmrRaw&&bmrRaw!=='--'?parseInt(bmrRaw):null,
          note:'',photo:null,_t:dt.getTime()});
      }
      const byDate={};results.forEach(r=>{if(!byDate[r.date]||r._t<byDate[r.date]._t)byDate[r.date]=r;});
      const parsed=Object.values(byDate).map(({_t,...r})=>r);
      if(!parsed.length){alert('No data found.');return;}
      const byDate2={};[...gE(),...parsed].forEach(r=>{byDate2[r.date]=r;});
      sE(Object.values(byDate2).sort((a,b)=>a.date.localeCompare(b.date)));
      alert('✅ Imported '+parsed.length+' readings!');render();
    }catch(e){alert('Import failed. Check file format.');}
  };
  reader.readAsText(file);
};

window.addEventListener('resize',()=>{if(profile&&tab==='chart')drawChart();});
const last=gl('wt_last',null);
if(last){const found=profiles.find(x=>x.id===last.id);if(found){profile=found;palette=found.palette||'primary';}}
render();
