<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Mass Track</title>
<style>
:root{
  --bg:#fef08a; --text:#111; --text-muted:#555; --text-faint:#888;
  --main:#1d4ed8; --accent:#dc2626; --trend:#dc2626; --goal:#f59e0b;
  --card:#fff; --card2:#fef9c3; --border:#111; --shadow:#111;
  --green:#16a34a; --purple:#7c3aed;
  --btn-text:#fff; --tab-active:#dc2626; --del:#dc2626;
  --section-label:#dc2626; --inp-bg:#fef9c3;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:system-ui,sans-serif;color:var(--text);min-height:100vh;}
.wrap{max-width:480px;margin:0 auto;padding:20px 16px 60px;}
.card{background:var(--card);border:3px solid var(--border);border-radius:16px;box-shadow:4px 4px 0 var(--shadow);padding:16px;margin-bottom:14px;}
.card-blue{background:var(--main);border:3px solid var(--border);border-radius:16px;box-shadow:4px 4px 0 var(--shadow);padding:14px 18px;margin-bottom:14px;}
input,select,textarea,button{font-family:inherit;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
.inp{background:var(--inp-bg);border:2px solid var(--border);border-radius:9px;color:var(--text);padding:9px 12px;font-size:14px;outline:none;width:100%;}
.btn{background:var(--main);color:var(--btn-text);border:2px solid var(--border);border-radius:9px;padding:10px 16px;font-weight:700;font-size:14px;cursor:pointer;box-shadow:2px 2px 0 var(--shadow);width:100%;display:block;text-align:center;}
.btn-red{background:var(--accent)!important;}
.btn-green{background:var(--green)!important;}
.btn-yellow{background:var(--bg)!important;color:var(--text)!important;}
.btn-sm{padding:6px 12px;font-size:12px;width:auto;display:inline-block;}
.row2{display:flex;gap:8px;margin-bottom:8px;align-items:stretch;}
.row2 .inp{flex:1;}
.tabs{display:flex;background:var(--card);border:3px solid var(--border);border-radius:14px;padding:4px;margin-bottom:16px;gap:4px;box-shadow:4px 4px 0 var(--shadow);}
.tab{flex:1;padding:7px 2px;border-radius:10px;border:2px solid transparent;cursor:pointer;font-weight:700;font-size:10px;background:transparent;color:var(--text-muted);}
.tab.active{background:var(--tab-active);color:#fff;border-color:var(--border);}
.pane{display:none;}.pane.active{display:block;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.scard{border:3px solid var(--border);border-radius:14px;padding:12px 14px;box-shadow:3px 3px 0 var(--shadow);}
.scard-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:4px;}
.scard-val{font-size:18px;font-weight:800;}
.entry{background:var(--card);border:3px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:flex-start;box-shadow:3px 3px 0 var(--shadow);}
.del{background:var(--del);border:2px solid var(--border);color:#fff;cursor:pointer;font-size:14px;font-weight:700;padding:4px 10px;border-radius:8px;flex-shrink:0;}
.section-label{font-size:12px;color:var(--section-label);font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;}
.err{color:var(--accent);font-size:12px;font-weight:600;margin-bottom:8px;display:none;}
.chip{background:var(--inp-bg);border:2px solid var(--border);border-radius:8px;padding:6px 10px;text-align:center;}
.chip-label{font-size:10px;color:var(--text-faint);text-transform:uppercase;font-weight:700;}
.chip-val{font-size:16px;font-weight:800;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px;}
.chart-wrap{position:relative;height:240px;margin-bottom:10px;}
canvas{max-width:100%;}
.ttime{display:flex;border:2px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:2px 2px 0 var(--shadow);flex-shrink:0;}
.ttime button{flex:1;padding:9px 14px;border:none;cursor:pointer;font-size:18px;background:var(--inp-bg);}
.ttime button.am{background:var(--goal);}
.ttime button.pm{background:var(--main);color:#fff;}
.metric-tabs{display:flex;gap:4px;margin-bottom:8px;}
.metric-tab{flex:1;padding:7px 4px;border-radius:9px;border:2px solid transparent;cursor:pointer;font-weight:700;font-size:10px;background:var(--card);color:var(--text-muted);}
.profile-btn{width:100%;background:var(--card);border:3px solid var(--border);border-radius:16px;box-shadow:4px 4px 0 var(--shadow);padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;text-align:left;margin-bottom:12px;}
.profile-avatar{width:44px;height:44px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.heatmap-cell{display:inline-block;border-radius:2px;}
select.inp{cursor:pointer;}
.legend{display:flex;gap:12px;margin-top:6px;padding-left:4px;}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text-muted);}
.legend-dot{width:10px;height:10px;border-radius:2px;}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ═══════════════════════════════════════════════════════════
// DATA & HELPERS
// ═══════════════════════════════════════════════════════════
function ls(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

function parseVeSync(text){
  const lines=text.trim().split('\n');
  const results=[];
  for(let i=1;i<lines.length;i++){
    const raw=lines[i].replace(/^"|"$/g,'');
    const row=raw.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/);
    if(row.length<2)continue;
    const timeStr=row[0].replace(/"/g,'').trim();
    const weightRaw=row[1].replace(/lb/gi,'').trim();
    const bmiRaw=row[2]?.trim();
    const bfRaw=row[3]?.replace(/%/g,'').trim();
    const visRaw=row[6]?.trim();
    const musRaw=row[8]?.replace(/%/g,'').trim();
    const bmrRaw=row[12]?.replace(/kcal/gi,'').trim();
    const dt=new Date(timeStr);
    if(isNaN(dt))continue;
    const date=dt.toISOString().split('T')[0];
    const weight=parseFloat(weightRaw);
    if(isNaN(weight))continue;
    results.push({
      date, weight:Math.round(weight*10)/10,
      time:dt.getHours()<12?'morning':'night',
      bodyFat:bfRaw&&bfRaw!=='--'?parseFloat(bfRaw):null,
      bmi:bmiRaw&&bmiRaw!=='--'?parseFloat(bmiRaw):null,
      visceralFat:visRaw&&visRaw!=='--'?parseFloat(visRaw):null,
      musclePct:musRaw&&musRaw!=='--'?parseFloat(musRaw):null,
      bmr:bmrRaw&&bmrRaw!=='--'?parseInt(bmrRaw):null,
      note:'',photo:null,_t:dt.getTime()
    });
  }
  const byDate={};
  results.forEach(r=>{if(!byDate[r.date]||r._t<byDate[r.date]._t)byDate[r.date]=r;});
  return Object.values(byDate).map(({_t,...r})=>r);
}

const IMPORTED = [];

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
const COLORS = ['#1d4ed8','#dc2626','#16a34a','#7c3aed','#f59e0b'];
const ICONS = ['⭐','🌙','🌸','🔥','💪','🐾','🌊','🎯','🦋','🌈','🍀','⚡','🎵','🏆','🌺','🦊','🐬','❄️','💎','🌻'];
const MAX_PROFILES = 5;

let profiles = ls('wt_profiles', [{id:'p0',name:'Me',icon:'⭐'}]);
let currentProfile = null;
let currentTab = 'chart';
let currentMetric = 'weight';
let currentChartType = 'line';
let currentTime = 'morning';
let chartInstance = null;
let dateRangeFrom = '';
let dateRangeTo = '';
let dateRangePreset = 'all';
let currentPalette = 'primary';

const PALETTES = {
  primary:  { name:'🟡 Primary',    bg:'#fef08a', text:'#111', textMuted:'#555', textFaint:'#888', main:'#1d4ed8', accent:'#dc2626', trend:'#dc2626', goal:'#f59e0b', card:'#fff', card2:'#fef9c3', border:'#111', shadow:'#111', green:'#16a34a', purple:'#7c3aed', btnText:'#fff', tabActive:'#dc2626', del:'#dc2626', sectionLabel:'#dc2626', inpBg:'#fef9c3' },
  sunset:   { name:'🌅 Sunset',     bg:'#431407', text:'#fed7aa', textMuted:'#fb923c', textFaint:'#f97316', main:'#f97316', accent:'#e11d48', trend:'#fbbf24', goal:'#fbbf24', card:'#7c2d12', card2:'#9a3412', border:'#fb923c', shadow:'#431407', green:'#10b981', purple:'#c084fc', btnText:'#fff', tabActive:'#e11d48', del:'#e11d48', sectionLabel:'#fb923c', inpBg:'#9a3412' },
  ocean:    { name:'🌊 Ocean',      bg:'#ecfeff', text:'#164e63', textMuted:'#0e7490', textFaint:'#0891b2', main:'#0891b2', accent:'#0e7490', trend:'#6366f1', goal:'#34d399', card:'#fff', card2:'#cffafe', border:'#0891b2', shadow:'#164e63', green:'#34d399', purple:'#6366f1', btnText:'#fff', tabActive:'#0891b2', del:'#0e7490', sectionLabel:'#0891b2', inpBg:'#cffafe' },
  forest:   { name:'🌲 Forest',     bg:'#f0fdf4', text:'#14532d', textMuted:'#166534', textFaint:'#16a34a', main:'#16a34a', accent:'#15803d', trend:'#84cc16', goal:'#fbbf24', card:'#fff', card2:'#dcfce7', border:'#16a34a', shadow:'#14532d', green:'#15803d', purple:'#84cc16', btnText:'#fff', tabActive:'#16a34a', del:'#15803d', sectionLabel:'#16a34a', inpBg:'#dcfce7' },
  midnight: { name:'🌙 Midnight',   bg:'#0f172a', text:'#f1f5f9', textMuted:'#94a3b8', textFaint:'#64748b', main:'#818cf8', accent:'#f472b6', trend:'#34d399', goal:'#fbbf24', card:'#1e293b', card2:'#334155', border:'#334155', shadow:'#0f172a', green:'#34d399', purple:'#f472b6', btnText:'#fff', tabActive:'#818cf8', del:'#f472b6', sectionLabel:'#818cf8', inpBg:'#334155' },
  rose:     { name:'🌸 Rose',       bg:'#fff1f2', text:'#881337', textMuted:'#be123c', textFaint:'#e11d48', main:'#e11d48', accent:'#be123c', trend:'#9333ea', goal:'#f59e0b', card:'#fff', card2:'#ffe4e6', border:'#e11d48', shadow:'#881337', green:'#10b981', purple:'#9333ea', btnText:'#fff', tabActive:'#e11d48', del:'#be123c', sectionLabel:'#e11d48', inpBg:'#ffe4e6' },
  mono:     { name:'🖤 Monochrome', bg:'#f5f5f5', text:'#111', textMuted:'#555', textFaint:'#888', main:'#111', accent:'#333', trend:'#888', goal:'#aaa', card:'#fff', card2:'#e5e5e5', border:'#111', shadow:'#111', green:'#333', purple:'#555', btnText:'#fff', tabActive:'#111', del:'#333', sectionLabel:'#333', inpBg:'#e5e5e5' },
  soviet:   { name:'☭ Soviet',      bg:'#b91c1c', text:'#fef08a', textMuted:'#fde047', textFaint:'#fbbf24', main:'#fef08a', accent:'#fde047', trend:'#fff', goal:'#fff', card:'#991b1b', card2:'#7f1d1d', border:'#fef08a', shadow:'#7f1d1d', green:'#fde047', purple:'#fbbf24', btnText:'#7f1d1d', tabActive:'#fef08a', del:'#fde047', sectionLabel:'#fef08a', inpBg:'#7f1d1d' },
  retro:    { name:'💻 Retro',      bg:'#0d0d0d', text:'#00ff41', textMuted:'#00cc33', textFaint:'#009922', main:'#00ff41', accent:'#00cc33', trend:'#00ff41', goal:'#00aa22', card:'#0a1a0a', card2:'#0d1f0d', border:'#00ff41', shadow:'#003311', green:'#00aa22', purple:'#00cc33', btnText:'#0d0d0d', tabActive:'#00ff41', del:'#00cc33', sectionLabel:'#00ff41', inpBg:'#0d1f0d' },
};

function pal(){ return PALETTES[currentPalette] || PALETTES.primary; }

function pk(k){ return `wt_${currentProfile.id}_${k}`; }
function getEntries(){ return ls(pk('entries'), currentProfile.id==='p0'?IMPORTED:[]); }
function getMeas(){ return ls(pk('meas'),[]); }
function getGoal(){ return ls(pk('goal'),150); }
function getBfGoal(){ return ls(pk('bfgoal'),25); }
function saveEntries(e){ ss(pk('entries'),e); }
function saveMeas(m){ ss(pk('meas'),m); }
function saveGoal(g){ ss(pk('goal'),g); }
function saveBfGoal(g){ ss(pk('bfgoal'),g); }

function sorted(entries){ return [...entries].sort((a,b)=>a.date.localeCompare(b.date)); }

function filteredSorted(entries){
  let s = sorted(entries);
  if(dateRangePreset !== 'all' && dateRangePreset !== 'custom') {
    const now = new Date();
    const days = {week:7,month:30,three:90,six:180,year:365}[dateRangePreset];
    if(days){
      const from = new Date(now); from.setDate(from.getDate()-days);
      const fromStr = from.toISOString().split('T')[0];
      s = s.filter(e => e.date >= fromStr);
    }
  } else if(dateRangePreset === 'custom') {
    if(dateRangeFrom) s = s.filter(e => e.date >= dateRangeFrom);
    if(dateRangeTo)   s = s.filter(e => e.date <= dateRangeTo);
  }
  return s;
}

function movingAvg(data, key, w=5){
  return data.map((d,i)=>{
    const sl=data.slice(Math.max(0,i-w+1),i+1).filter(x=>x[key]!=null);
    if(!sl.length)return {...d,[key+'Trend']:null};
    return {...d,[key+'Trend']:parseFloat((sl.reduce((s,x)=>s+x[key],0)/sl.length).toFixed(2))};
  });
}

function bmiCat(b){
  if(!b)return null; const n=parseFloat(b);
  if(n<18.5)return{label:'Underweight',color:'#3b82f6'};
  if(n<25)return{label:'Normal',color:'#16a34a'};
  if(n<30)return{label:'Overweight',color:'#f59e0b'};
  return{label:'Obese',color:'#dc2626'};
}
function bfCat(bf){
  if(!bf)return null; const n=parseFloat(bf);
  if(n<14)return{label:'Essential',color:'#3b82f6'};
  if(n<21)return{label:'Athletic',color:'#16a34a'};
  if(n<25)return{label:'Fitness',color:'#84cc16'};
  if(n<32)return{label:'Average',color:'#f59e0b'};
  return{label:'Obese',color:'#dc2626'};
}
function fmtDate(d){ const[,m,day]=d.split('-'); return m+'/'+day; }

function getMetricDefs(){ const p=pal(); return {
  weight:     {label:'⚖️ Weight',   color:p.main,   unit:'lbs'},
  bodyFat:    {label:'🔥 Body Fat', color:p.purple, unit:'%'},
  musclePct:  {label:'💪 Muscle',   color:p.green,  unit:'%'},
  visceralFat:{label:'🫀 Visceral', color:p.accent, unit:''},
};}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
function render(){
  const p=pal();
  const r=document.documentElement;
  r.style.setProperty('--bg',       p.bg);
  r.style.setProperty('--text',     p.text);
  r.style.setProperty('--text-muted', p.textMuted);
  r.style.setProperty('--text-faint', p.textFaint);
  r.style.setProperty('--main',     p.main);
  r.style.setProperty('--accent',   p.accent);
  r.style.setProperty('--trend',    p.trend);
  r.style.setProperty('--goal',     p.goal);
  r.style.setProperty('--card',     p.card);
  r.style.setProperty('--card2',    p.card2);
  r.style.setProperty('--border',   p.border);
  r.style.setProperty('--shadow',   p.shadow);
  r.style.setProperty('--green',    p.green);
  r.style.setProperty('--purple',   p.purple);
  r.style.setProperty('--btn-text', p.btnText);
  r.style.setProperty('--tab-active', p.tabActive);
  r.style.setProperty('--del',      p.del);
  r.style.setProperty('--section-label', p.sectionLabel);
  r.style.setProperty('--inp-bg',   p.inpBg);
  document.body.style.background = p.bg;
  document.body.style.color = p.text;
  document.getElementById('root').innerHTML = currentProfile ? renderTracker() : renderProfiles();
  bindEvents();
  if(currentProfile && currentTab==='chart') renderChart();
}

// ── PROFILES ─────────────────────────────────────────────
function renderProfiles(){
  const saveLS_count = (id) => {
    try{ const e=JSON.parse(localStorage.getItem(`wt_${id}_entries`)); return e?`${e.length} readings`:'No data yet'; }catch{ return 'No data yet'; }
  };
  return `
  <div class="wrap">
    <div style="font-size:11px;letter-spacing:.18em;color:var(--accent);text-transform:uppercase;font-weight:700;margin-bottom:6px;">Weight Tracker</div>
    <div style="font-size:28px;font-weight:900;margin-bottom:6px;">Who's tracking?</div>
    <div style="font-size:13px;color:var(--text-muted);margin-bottom:24px;">Select a profile to continue.</div>
    ${profiles.map((p,i)=>`
      <div style="background:var(--card);border:3px solid var(--border);border-radius:16px;box-shadow:4px 4px 0 var(--shadow);margin-bottom:12px;overflow:hidden;">
        <div style="display:flex;align-items:center;">
          <button onclick="selectProfile('${p.id}')" style="flex:1;display:flex;align-items:center;gap:14px;padding:14px 16px;background:none;border:none;cursor:pointer;text-align:left;">
            <div style="width:44px;height:44px;border-radius:50%;background:${COLORS[i%COLORS.length]};border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;">${p.icon||'⭐'}</div>
            <div>
              <div style="font-size:17px;font-weight:800;">${p.name}</div>
              <div style="font-size:11px;color:var(--text-faint);">${saveLS_count(p.id)}</div>
            </div>
          </button>
          <div style="display:flex;gap:6px;padding:0 12px;">
            <button class="btn btn-sm btn-yellow" style="border:2px solid var(--border);" onclick="editProfile('${p.id}')">✏️</button>
            ${profiles.length>1?`<button class="btn btn-sm btn-red" onclick="deleteProfile('${p.id}')">🗑️</button>`:''}
          </div>
        </div>
      </div>
    `).join('')}

    <div id="editProfilePanel" style="display:none;margin-bottom:14px;" class="card"></div>

    ${profiles.length<MAX_PROFILES?`
      <button class="btn btn-green" onclick="addProfile()">+ Add person (${profiles.length}/${MAX_PROFILES})</button>
    `:''}
  </div>`;
}

// ── TRACKER ───────────────────────────────────────────────
function renderTracker(){
  const entries = getEntries();
  const s = sorted(entries);
  const goal = getGoal();
  const bfGoal = getBfGoal();
  const meas = getMeas();

  // Stats
  let stats = null;
  if(s.length){
    const ws=s.map(e=>e.weight);
    const bfs=s.map(e=>e.bodyFat).filter(Boolean);
    const cur=ws[ws.length-1];
    const last=s[s.length-1];
    stats={
      current:cur,min:Math.min(...ws),max:Math.max(...ws),
      avg:(ws.reduce((a,b)=>a+b,0)/ws.length).toFixed(1),
      change:(cur-ws[0]).toFixed(1),
      currentBf:last.bodyFat,currentBmi:last.bmi,
      currentMuscle:last.musclePct,currentVisceral:last.visceralFat,currentBmr:last.bmr,
      minBf:bfs.length?Math.min(...bfs).toFixed(1):null,
      maxBf:bfs.length?Math.max(...bfs).toFixed(1):null,
      changeBf:bfs.length>1?(last.bodyFat-bfs[0]).toFixed(1):null,
    };
  }
  const bmiInfo = stats?.currentBmi ? bmiCat(stats.currentBmi) : null;
  const bfInfo  = stats?.currentBf  ? bfCat(stats.currentBf)   : null;
  const toGoal  = stats ? (stats.current-goal).toFixed(1) : null;

  return `
  <div class="wrap">
    <!-- Header -->
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;">
      <div>
        <button onclick="switchUser()" style="background:none;border:none;cursor:pointer;font-size:11px;letter-spacing:.18em;color:var(--accent);text-transform:uppercase;font-weight:700;margin-bottom:4px;padding:0;">← Profiles</button>
        <div style="font-size:22px;font-weight:900;margin-bottom:2px;">${currentProfile.name}</div>
        <div style="font-size:30px;font-weight:900;color:var(--main);letter-spacing:-.03em;">${stats?stats.current+' lbs':'No data yet'}</div>
        ${stats?`<div style="font-size:13px;color:var(--text-muted);margin-top:2px;">${parseFloat(stats.change)<0?'↓ '+Math.abs(stats.change):'↑ '+stats.change} lbs total${stats.currentBf?' · '+stats.currentBf+'% BF':''}${stats.currentBmr?' · '+stats.currentBmr+' BMR':''}</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;margin-top:4px;">
        <input type="file" id="csvFile" accept=".csv" style="display:none;" onchange="importCSV(this)">
        <button class="btn btn-green btn-sm" onclick="document.getElementById('csvFile').click()">📥 CSV</button>
        <button class="btn btn-red btn-sm" onclick="window.print()">🖨️ Print</button>
      </div>
    </div>

    <!-- Body Comp Toggle -->
    <button class="btn btn-yellow" style="border:3px solid var(--border);box-shadow:3px 3px 0 var(--shadow);margin-bottom:10px;font-size:13px;" onclick="toggleBMI()">
      <span id="bmiArrow">▸</span> Body Composition${stats?.currentBmi?' — BMI '+stats.currentBmi+(bmiInfo?' ('+bmiInfo.label+')':''):''}${stats?.currentBf?' · '+stats.currentBf+'% BF'+(bfInfo?' ('+bfInfo.label+')':''):''}
    </button>
    <div id="bmiPanel" style="display:none;">
      <div class="card">
        <div class="grid2">
          ${[
            {l:'BMI',v:stats?.currentBmi??'—',c:bmiInfo?.color??'#111',sub:bmiInfo?.label},
            {l:'Body Fat',v:stats?.currentBf?stats.currentBf+'%':'—',c:bfInfo?.color??'#111',sub:bfInfo?.label},
            {l:'Muscle %',v:stats?.currentMuscle?stats.currentMuscle+'%':'—',c:p.green,sub:null},

// ── SPECIAL CHARTS ────────────────────────────────────────
function renderRing(s, goal, bfGoal, stats){
  const p=pal();
  if(!stats) return '<div class="card" style="text-align:center;padding:40px 0;">No data yet.</div>';
  const start=s[0]?.weight??stats.current;
  const lost=start-stats.current;
  const totalToLose=start-goal;
  const pct=totalToLose>0?Math.min(100,Math.max(0,(lost/totalToLose)*100)):0;
  const rv=70,cx=120,cy=100,sw=22,circ=2*Math.PI*rv;
  const bfStart=s.find(e=>e.bodyFat)?.bodyFat;
  const bfPct=bfStart&&stats.currentBf&&bfGoal<bfStart?Math.min(100,Math.max(0,((bfStart-stats.currentBf)/(bfStart-bfGoal))*100)):null;
  return `<div class="card">
    <div style="display:flex;justify-content:space-around;flex-wrap:wrap;gap:8px;">
      <div style="text-align:center;">
        <svg width="240" height="200">
          <circle cx="${cx}" cy="${cy}" r="${rv}" fill="none" stroke="${p.border}33" stroke-width="${sw}"/>
          <circle cx="${cx}" cy="${cy}" r="${rv}" fill="none" stroke="${pct>=100?p.green:p.main}" stroke-width="${sw}" stroke-dasharray="${(pct/100)*circ} ${circ}" stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})"/>
          <text x="${cx}" y="${cy-10}" text-anchor="middle" font-size="26" font-weight="900" fill="${p.text}">${Math.round(pct)}%</text>
          <text x="${cx}" y="${cy+12}" text-anchor="middle" font-size="12" fill="${p.textMuted}">to goal</text>
          <text x="${cx}" y="${cy+30}" text-anchor="middle" font-size="10" fill="${p.textFaint}">${stats.current} → ${goal} lbs</text>
          <text x="${cx}" y="${cy+48}" text-anchor="middle" font-size="11" fill="${lost>=0?p.green:p.accent}" font-weight="700">${lost>=0?'↓ '+lost.toFixed(1)+' lbs lost':'↑ '+Math.abs(lost).toFixed(1)+' lbs gained'}</text>
        </svg>
        <div style="font-size:12px;font-weight:700;color:${p.textMuted};">⚖️ Weight Goal</div>
      </div>
      ${bfPct!==null?`
      <div style="text-align:center;">
        <svg width="240" height="200">
          <circle cx="${cx}" cy="${cy}" r="${rv}" fill="none" stroke="${p.border}33" stroke-width="${sw}"/>
          <circle cx="${cx}" cy="${cy}" r="${rv}" fill="none" stroke="${bfPct>=100?p.green:p.purple}" stroke-width="${sw}" stroke-dasharray="${(bfPct/100)*circ} ${circ}" stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})"/>
          <text x="${cx}" y="${cy-10}" text-anchor="middle" font-size="26" font-weight="900" fill="${p.text}">${Math.round(bfPct)}%</text>
          <text x="${cx}" y="${cy+12}" text-anchor="middle" font-size="12" fill="${p.textMuted}">to BF goal</text>
          <text x="${cx}" y="${cy+30}" text-anchor="middle" font-size="10" fill="${p.textFaint}">${bfStart}% → ${bfGoal}%</text>
          <text x="${cx}" y="${cy+48}" text-anchor="middle" font-size="11" fill="${p.purple}" font-weight="700">Now: ${stats.currentBf}%</text>
        </svg>
        <div style="font-size:12px;font-weight:700;color:${p.textMuted};">🔥 Body Fat Goal</div>
      </div>`:''}
    </div>
  </div>`;
}

function renderHeatmap(s){
  const byDate={};
  s.forEach(e=>{if(e[currentMetric]!=null)byDate[e.date]=e[currentMetric];});
  const vals=Object.values(byDate).filter(Boolean);
  const vMin=vals.length?Math.min(...vals):0;
  const vMax=vals.length?Math.max(...vals):1;
  const today=new Date();
  const startDate=new Date(today);
  startDate.setDate(startDate.getDate()-7*26+1);
  startDate.setDate(startDate.getDate()-startDate.getDay());
  const weeks=[];
  for(let w=0;w<26;w++){
    const week=[];
    for(let d=0;d<7;d++){
      const dt=new Date(startDate);
      dt.setDate(startDate.getDate()+w*7+d);
      const key=dt.toISOString().split('T')[0];
      week.push({date:key,value:byDate[key]??null});
    }
    weeks.push(week);
  }
  const getColor=v=>{
    if(v==null)return'#f1f5f9';
    const t=(v-vMin)/(vMax-vMin||1);
    return`rgb(${Math.round(22+t*198)},${Math.round(163-t*125)},${Math.round(74-t*74)})`;
  };
  const cs=11,gap=2;
  return `<div class="card">
    <div style="font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:8px;">🗓️ Last 6 months — ${getMetricDefs()[currentMetric].label} by day</div>
    <div style="overflow-x:auto;">
      <div style="display:flex;gap:${gap}px;">
        <div style="display:flex;flex-direction:column;gap:${gap}px;margin-right:2px;">
          ${['S','M','T','W','T','F','S'].map(d=>`<div style="height:${cs}px;font-size:8px;color:#aaa;display:flex;align-items:center;">${d}</div>`).join('')}
        </div>
        ${weeks.map(week=>`
          <div style="display:flex;flex-direction:column;gap:${gap}px;">
            ${week.map(cell=>`
              <div title="${cell.value?cell.date+': '+cell.value+getMetricDefs()[currentMetric].unit:cell.date}"
                style="width:${cs}px;height:${cs}px;border-radius:2px;background:${getColor(cell.value)};${cell.value?'border:1px solid rgba(0,0,0,.1);':''}"></div>
            `).join('')}
          </div>`).join('')}
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:4px;margin-top:10px;">
      <span style="font-size:10px;color:var(--text-faint);">Less</span>
      ${[0,.25,.5,.75,1].map(t=>`<div style="width:12px;height:12px;border-radius:2px;background:${getColor(vMin+t*(vMax-vMin))};"></div>`).join('')}
      <span style="font-size:10px;color:var(--text-faint);">More</span>
      <span style="font-size:10px;color:#aaa;margin-left:8px;">Gray = no data</span>
    </div>
  </div>`;
}

function renderStacked(s){
  const stackData=s.filter(d=>d.bodyFat!=null&&d.musclePct!=null);
  if(stackData.length<2) return '<div class="card" style="text-align:center;color:var(--text-faint);padding:40px 0;">Need body fat data to show this chart.</div>';
  // Use canvas
  return `<div class="card" style="padding:12px 8px 10px;">
    <div style="font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:8px;">🧱 Fat vs Muscle vs Other (lbs)</div>
    <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent);"></div>Fat</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--green);"></div>Muscle</div>
      <div class="legend-item"><div class="legend-dot" style="background:#93c5fd;"></div>Other</div>
    </div>
  </div>`;
}

function renderRate(s){
  const rateData=[];
  for(let i=1;i<s.length;i++){
    const prev=s[i-1],curr=s[i];
    const days=(new Date(curr.date)-new Date(prev.date))/86400000;
    if(days>0&&days<=14) rateData.push({date:curr.date,change:parseFloat(((curr.weight-prev.weight)/days*7).toFixed(2))});
  }
  if(rateData.length<2) return '<div class="card" style="text-align:center;color:var(--text-faint);padding:40px 0;">Need more entries to calculate rate.</div>';
  return `<div class="card" style="padding:12px 8px 10px;">
    <div style="font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:8px;">📉 Weekly rate of change (lbs/week)</div>
    <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--green);"></div>Lost</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent);"></div>Gained</div>
    </div>
  </div>`;
}

// ── PURE CANVAS CHARTS (no external library) ──────────────
function renderChart(){
  const canvas=document.getElementById('mainChart');
  if(!canvas)return;
  chartInstance=null;

  const entries=getEntries();
  const s=filteredSorted(entries);
  const goal=getGoal();
  const bfGoal=getBfGoal();
  const mDef=getMetricDefs()[currentMetric];
  const p=pal();
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const W=canvas.parentElement.clientWidth-8;
  const H=240;
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  ctx.scale(dpr,dpr);

  if(!s.length){
    ctx.fillStyle=p.textMuted; ctx.font='14px system-ui'; ctx.textAlign='center';
    ctx.fillText('Add entries to see your chart.',W/2,H/2); return;
  }

  // Build datasets
  const metric=currentMetric;
  let vals,labels,trend,fatVals,muscleVals,otherVals,rateVals,rateLabels;

  if(currentChartType==='stacked'){
    const sd=s.filter(d=>d.bodyFat!=null&&d.musclePct!=null);
    if(sd.length<2){ctx.fillStyle=p.textMuted;ctx.font='13px system-ui';ctx.textAlign='center';ctx.fillText('Need body fat data for this chart.',W/2,H/2);return;}
    labels=sd.map(d=>fmtDate(d.date));
    fatVals=sd.map(d=>+(d.weight*d.bodyFat/100).toFixed(1));
    muscleVals=sd.map(d=>+(d.weight*d.musclePct/100).toFixed(1));
    otherVals=sd.map(d=>Math.max(0,+(d.weight*(1-d.bodyFat/100-d.musclePct/100)).toFixed(1)));
  } else if(currentChartType==='rate'){
    rateVals=[]; rateLabels=[];
    for(let i=1;i<s.length;i++){
      const prev=s[i-1],curr=s[i];
      const days=(new Date(curr.date)-new Date(prev.date))/86400000;
      if(days>0&&days<=14){rateVals.push(parseFloat(((curr.weight-prev.weight)/days*7).toFixed(2)));rateLabels.push(fmtDate(curr.date));}
    }
    if(rateVals.length<2){ctx.fillStyle=p.textMuted;ctx.font='13px system-ui';ctx.textAlign='center';ctx.fillText('Need more entries to calculate rate.',W/2,H/2);return;}
  } else {
    const data=movingAvg(s,metric);
    labels=data.map(d=>fmtDate(d.date));
    vals=data.map(d=>d[metric]);
    trend=data.map(d=>d[metric+'Trend']);
  }

  // Layout
  const PAD={top:12,right:12,bottom:32,left:44};
  const cW=W-PAD.left-PAD.right;
  const cH=H-PAD.top-PAD.bottom;

  function allData(){
    if(currentChartType==='stacked') return [...fatVals,...muscleVals,...otherVals].map((v,i)=>fatVals[i]+(muscleVals[i]||0)+(otherVals[i]||0));
    if(currentChartType==='rate') return rateVals;
    return [...(vals||[]),...(trend||[])].filter(v=>v!=null);
  }
  const ad=allData().filter(v=>v!=null);
  const cGoal=metric==='weight'?goal:metric==='bodyFat'?bfGoal:null;
  if(cGoal)ad.push(cGoal);
  const vMin=ad.length?Math.floor(Math.min(...ad)-2):0;
  const vMax=ad.length?Math.ceil(Math.max(...ad)+2):100;
  const vRange=vMax-vMin||1;

  const n=(currentChartType==='rate'?rateLabels:labels)?.length||1;

  function xPos(i){return PAD.left+(i/(Math.max(n-1,1)))*cW;}
  function xBar(i){return PAD.left+(i/n)*cW;}
  function barW(){return Math.max(2,cW/n*0.7);}
  function yPos(v){return PAD.top+(1-(v-vMin)/vRange)*cH;}

  // Grid
  ctx.strokeStyle=p.border+'33'; ctx.lineWidth=1;
  const steps=5;
  ctx.font=`10px system-ui`; ctx.fillStyle=p.textFaint; ctx.textAlign='right';
  for(let i=0;i<=steps;i++){
    const v=vMin+(vRange*i/steps);
    const y=yPos(v);
    ctx.beginPath();ctx.moveTo(PAD.left,y);ctx.lineTo(PAD.left+cW,y);ctx.stroke();
    ctx.fillText(Math.round(v),PAD.left-4,y+3);
  }

  // X labels
  const lbs=currentChartType==='rate'?rateLabels:labels;
  const step=Math.max(1,Math.ceil(lbs.length/7));
  ctx.fillStyle=p.textFaint; ctx.textAlign='center';
  lbs.forEach((l,i)=>{if(i%step===0)ctx.fillText(l,xPos(i),H-PAD.bottom+14);});

  // Zero line for rate
  if(currentChartType==='rate'){
    ctx.strokeStyle=p.border; ctx.lineWidth=1.5; ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(PAD.left,yPos(0));ctx.lineTo(PAD.left+cW,yPos(0));ctx.stroke();
  }

  // Goal line
  if(cGoal&&currentChartType!=='stacked'&&currentChartType!=='rate'){
    ctx.strokeStyle=p.goal; ctx.lineWidth=1.5; ctx.setLineDash([5,3]);
    ctx.beginPath();ctx.moveTo(PAD.left,yPos(cGoal));ctx.lineTo(PAD.left+cW,yPos(cGoal));ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle=p.goal; ctx.textAlign='right'; ctx.font='10px system-ui';
    ctx.fillText('Goal '+cGoal,PAD.left+cW,yPos(cGoal)-4);
  }

  // ── Draw by type ──
  if(currentChartType==='bar'){
    const bw=barW();
    vals.forEach((v,i)=>{
      if(v==null)return;
      ctx.fillStyle=mDef.color;
      const y=yPos(v),h=yPos(vMin)-y;
      ctx.beginPath();ctx.roundRect(xBar(i)+barW()*0.15,y,bw,h,3);ctx.fill();
    });
  } else if(currentChartType==='stacked'){
    const bw=barW();
    fatVals.forEach((_,i)=>{
      const x=xBar(i)+bw*0.15;
      let base=vMin;
      [[fatVals[i],p.accent],[muscleVals[i],p.green],[otherVals[i],'#93c5fd']].forEach(([v,c])=>{
        if(!v)return;
        ctx.fillStyle=c;
        const y=yPos(base+v),h=yPos(base)-y;
        ctx.beginPath();ctx.roundRect(x,y,bw,h,2);ctx.fill();
        base+=v;
      });
    });
  } else if(currentChartType==='rate'){
    const bw=barW();
    rateVals.forEach((v,i)=>{
      ctx.fillStyle=v<=0?p.green:p.accent;
      const y=v<=0?yPos(v):yPos(0),h=Math.abs(yPos(0)-yPos(v));
      ctx.beginPath();ctx.roundRect(xBar(i)+bw*0.15,y,bw,Math.max(2,h),3);ctx.fill();
    });
  } else {
    // Line / Area / Scatter / Combo
    const isArea=currentChartType==='area';
    const isCombo=currentChartType==='combo';
    const isScatter=currentChartType==='scatter';

    // Combo bars
    if(isCombo){
      const bw=barW();
      vals.forEach((v,i)=>{
        if(v==null)return;
        ctx.fillStyle=mDef.color+'99';
        const y=yPos(v),h=yPos(vMin)-y;
        ctx.beginPath();ctx.roundRect(xBar(i)+bw*0.15,y,bw,h,2);ctx.fill();
      });
    }

    // Area fill
    if(isArea&&vals.filter(v=>v!=null).length>1){
      ctx.beginPath();
      let first=true;
      vals.forEach((v,i)=>{
        if(v==null)return;
        if(first){ctx.moveTo(xPos(i),yPos(v));first=false;}
        else ctx.lineTo(xPos(i),yPos(v));
      });
      ctx.lineTo(xPos(vals.length-1),yPos(vMin));
      ctx.lineTo(xPos(vals.findIndex(v=>v!=null)),yPos(vMin));
      ctx.closePath();
      ctx.fillStyle=mDef.color+'33'; ctx.fill();
    }

    // Main line or scatter
    if(isScatter){
      vals.forEach((v,i)=>{
        if(v==null)return;
        ctx.beginPath();ctx.arc(xPos(i),yPos(v),5,0,Math.PI*2);
        ctx.fillStyle=mDef.color;ctx.fill();
        ctx.strokeStyle=p.border;ctx.lineWidth=1.5;ctx.stroke();
      });
    } else if(!isCombo||true){
      ctx.beginPath();ctx.setLineDash([]);ctx.strokeStyle=mDef.color;ctx.lineWidth=2.5;
      let first=true;
      vals.forEach((v,i)=>{
        if(v==null)return;
        if(first){ctx.moveTo(xPos(i),yPos(v));first=false;}
        else ctx.lineTo(xPos(i),yPos(v));
      });
      ctx.stroke();
      // dots
      vals.forEach((v,i)=>{
        if(v==null)return;
        ctx.beginPath();ctx.arc(xPos(i),yPos(v),4,0,Math.PI*2);
        ctx.fillStyle=mDef.color;ctx.fill();
        ctx.strokeStyle=p.border;ctx.lineWidth=1.5;ctx.stroke();
      });
    }

    // Trend line
    if(trend&&trend.filter(v=>v!=null).length>1){
      ctx.beginPath();ctx.setLineDash([4,2]);ctx.strokeStyle=p.trend;ctx.lineWidth=1.5;
      let first=true;
      trend.forEach((v,i)=>{
        if(v==null)return;
        if(first){ctx.moveTo(xPos(i),yPos(v));first=false;}
        else ctx.lineTo(xPos(i),yPos(v));
      });
      ctx.stroke();ctx.setLineDash([]);
    }
  }

  // Update legend
  const legendEl=document.getElementById('chartLegend');
  if(legendEl){
    if(currentChartType==='stacked'){
      legendEl.innerHTML=`<div class="legend-item"><div class="legend-dot" style="background:${p.accent};"></div>Fat</div><div class="legend-item"><div class="legend-dot" style="background:${p.green};"></div>Muscle</div><div class="legend-item"><div class="legend-dot" style="background:#93c5fd;"></div>Other</div>`;
    } else if(currentChartType==='rate'){
      legendEl.innerHTML=`<div class="legend-item"><div class="legend-dot" style="background:${p.green};"></div>Lost</div><div class="legend-item"><div class="legend-dot" style="background:${p.accent};"></div>Gained</div>`;
    } else {
      legendEl.innerHTML=`<div class="legend-item"><div class="legend-dot" style="background:${mDef.color};"></div>Actual</div><div class="legend-item"><div class="legend-dot" style="background:${p.trend};"></div>Trend</div>${cGoal?`<div class="legend-item"><div class="legend-dot" style="background:${p.goal};"></div>Goal</div>`:''}`;
    }
  }
}

function bindEvents(){}

window.editProfile=function(id){
  const p=profiles.find(x=>x.id===id);
  if(!p)return;
  const panel=document.getElementById('editProfilePanel');
  panel.style.display='block';
  panel.innerHTML=`
    <div style="font-size:12px;color:var(--accent);font-weight:700;text-transform:uppercase;margin-bottom:10px;">Edit Profile</div>
    <input id="editName" class="inp" value="${p.name}" placeholder="Name" style="margin-bottom:10px;">
    <div style="font-size:11px;color:var(--text-faint);font-weight:700;margin-bottom:6px;">Choose an icon:</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;">
      ${ICONS.map(icon=>`
        <button onclick="selectIcon('${id}','${icon}')" style="width:38px;height:38px;border-radius:8px;border:${(p.icon||'⭐')===icon?'3px solid '+p.border+":'2px solid '+p.border};background:${(p.icon||'⭐')===icon?p.goal:p.card};font-size:18px;cursor:pointer;" id="icon-${icon}">${icon}</button>
      `).join('')}
    </div>
    <div style="font-size:11px;color:var(--text-faint);font-weight:700;margin-bottom:6px;">Choose a theme:</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;">
      ${Object.entries(PALETTES).map(([k,pal])=>`
        <button onclick="selectTheme('${k}')" id="theme-${k}"
          style="display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:9px;border:${(p.palette||'primary')===k?'3px solid #111':'2px solid #ccc'};cursor:pointer;background:${pal.bg};font-size:11px;font-weight:700;color:${pal.text};font-family:inherit;">
          <div style="width:12px;height:12px;border-radius:50%;background:${pal.main};flex-shrink:0;border:1px solid rgba(0,0,0,0.15);"></div>
          ${pal.name}
        </button>
      `).join('')}
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn" style="flex:1;" onclick="saveProfileEdit('${id}')">Save</button>
      <button class="btn btn-yellow" style="flex:1;border:2px solid var(--border);" onclick="closeEditPanel()">Cancel</button>
    </div>`;
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
};
window.selectIcon=function(id,icon){
  // Visually highlight selected icon
  ICONS.forEach(ic=>{
    const btn=document.getElementById('icon-'+ic);
    if(btn){btn.style.border='2px solid #e5e7eb';btn.style.background='#fff';}
  });
  const sel=document.getElementById('icon-'+icon);
  if(sel){sel.style.border='3px solid #111';sel.style.background='#fde047';}
  // Store temporarily
  window._pendingIcon=icon;
};
window.selectTheme=function(k){
  Object.keys(PALETTES).forEach(pk=>{
    const btn=document.getElementById('theme-'+pk);
    if(btn){btn.style.border='2px solid #ccc';}
  });
  const sel=document.getElementById('theme-'+k);
  if(sel)sel.style.border='3px solid #111';
  window._pendingPalette=k;
};
window.saveProfileEdit=function(id){
  const name=document.getElementById('editName').value.trim();
  if(!name)return;
  const icon=window._pendingIcon||(profiles.find(p=>p.id===id)?.icon||'⭐');
  const palette=window._pendingPalette||(profiles.find(p=>p.id===id)?.palette||'primary');
  profiles=profiles.map(p=>p.id===id?{...p,name,icon,palette}:p);
  ss('wt_profiles',profiles);
  if(currentProfile?.id===id){
    currentProfile={...currentProfile,name,icon,palette};
    currentPalette=palette;
    ss('wt_last_profile',currentProfile);
  }
  window._pendingIcon=null;
  window._pendingPalette=null;
  render();
};
window.closeEditPanel=function(){
  const panel=document.getElementById('editProfilePanel');
  if(panel)panel.style.display='none';
  window._pendingIcon=null;
};
window.selectProfile=function(id){
  currentProfile=profiles.find(p=>p.id===id);
  currentPalette=currentProfile.palette||'primary';
  ss('wt_last_profile',currentProfile);
  render();
};
window.switchUser=function(){currentProfile=null;currentPalette='primary';render();};
window.addProfile=function(){
  if(profiles.length>=MAX_PROFILES){alert('Maximum '+MAX_PROFILES+' profiles reached.');return;}
  const id='p'+Date.now();
  const newP={id,name:'New Person',icon:'⭐'};
  profiles=[...profiles,newP];
  ss('wt_profiles',profiles);
  render();
  // Auto-open edit for the new profile
  setTimeout(()=>window.editProfile(id),50);
};
window.deleteProfile=function(id){
  if(!confirm('Delete this profile and all its data?'))return;
  ['entries','meas','goal','bfgoal'].forEach(k=>{try{localStorage.removeItem(`wt_${id}_${k}`);}catch{}});
  profiles=profiles.filter(p=>p.id!==id);
  ss('wt_profiles',profiles);
  render();
};
window.switchTab=function(t){currentTab=t;render();};
window.setPalette=function(p){
  currentPalette=p;
  if(currentProfile){
    profiles=profiles.map(pr=>pr.id===currentProfile.id?{...pr,palette:p}:pr);
    currentProfile={...currentProfile,palette:p};
    ss('wt_profiles',profiles);
    ss('wt_last_profile',currentProfile);
  }
  render();
};
window.setDatePreset=function(p){
  dateRangePreset=p;
  if(p!=='custom'){dateRangeFrom='';dateRangeTo='';}
  render();
};
window.setDateFrom=function(v){dateRangeFrom=v;render();};
window.setDateTo=function(v){dateRangeTo=v;render();};
window.setChartType=function(t){currentChartType=t;render();};
window.setTime=function(t){
  currentTime=t;
  document.getElementById('btnAM').className=t==='morning'?'am':'';
  document.getElementById('btnPM').className=t==='night'?'pm':'';
};
window.toggleBMI=function(){
  const p=document.getElementById('bmiPanel');
  const a=document.getElementById('bmiArrow');
  const open=p.style.display==='none';
  p.style.display=open?'block':'none';
  a.textContent=open?'▾':'▸';
};
window.editGoal=function(){
  document.getElementById('goalDisplay').style.display='none';
  document.getElementById('goalEdit').style.display='flex';
};
window.saveGoal=function(){
  const g=parseFloat(document.getElementById('goalInput').value);
  if(!isNaN(g)&&g>50&&g<600){saveGoal(g);render();}
};
// Fix name collision
window.saveGoal=function(){
  const g=parseFloat(document.getElementById('goalInput').value);
  if(!isNaN(g)&&g>50&&g<600){ss(pk('goal'),g);render();}
};
window.addEntry=function(){
  const date=document.getElementById('logDate').value;
  const wt=parseFloat(document.getElementById('logWt').value);
  const bf=document.getElementById('logBf').value!==''?parseFloat(document.getElementById('logBf').value):null;
  const note=document.getElementById('logNote').value;
  const err=document.getElementById('logErr');
  if(isNaN(wt)||wt<50||wt>600){err.textContent='Enter a weight between 50–600 lbs.';err.style.display='block';return;}
  if(bf!==null&&(isNaN(bf)||bf<1||bf>70)){err.textContent='Body fat must be 1–70%.';err.style.display='block';return;}
  err.style.display='none';
  let entries=getEntries();
  entries=entries.filter(e=>e.date!==date);
  entries.push({date,weight:wt,bodyFat:bf,note,time:currentTime,photo:null});
  saveEntries(entries);
  render();
};
window.delEntry=function(date){
  let entries=getEntries().filter(e=>e.date!==date);
  saveEntries(entries);render();
};
window.addMeas=function(){
  const date=document.getElementById('mDate').value;
  const fields=['Chest','Waist','Hips','Arms','Thighs'];
  const entry={date};
  fields.forEach(f=>{
    const v=document.getElementById('m'+f).value;
    if(v!=='')entry[f.toLowerCase()]=parseFloat(v);
  });
  let meas=getMeas().filter(m=>m.date!==date);
  meas.push(entry);saveMeas(meas);render();
};
window.delMeas=function(date){saveMeas(getMeas().filter(m=>m.date!==date));render();};
window.triggerPhoto=function(){
  const date=document.getElementById('photoSelect').value;
  if(!date)return;
  document.getElementById('photoFile').click();
};
window.uploadPhoto=function(input){
  const date=document.getElementById('photoSelect').value;
  const file=input.files[0];
  if(!file||!date)return;
  const reader=new FileReader();
  reader.onload=e=>{
    let entries=getEntries().map(en=>en.date===date?{...en,photo:e.target.result}:en);
    saveEntries(entries);render();
  };
  reader.readAsDataURL(file);
};
window.delPhoto=function(date){
  let entries=getEntries().map(e=>e.date===date?{...e,photo:null}:e);
  saveEntries(entries);render();
};
window.importCSV=function(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const parsed=parseVeSync(e.target.result);
      if(!parsed.length){alert('No data found. Make sure it is a VeSync/Etekcity export.');return;}
      const byDate={};
      [...getEntries(),...parsed].forEach(r=>{byDate[r.date]=r;});
      saveEntries(Object.values(byDate).sort((a,b)=>a.date.localeCompare(b.date)));
      alert('✅ Imported '+parsed.length+' readings!');
      render();
    }catch{alert('Import failed.');}
  };
  reader.readAsText(file);
};
